<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Centauri Credit — FICO Command Center</title>
<meta name="theme-color" content="#0b0d12">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Centauri Credit">
<style>
/* ============ CENTAURI CREDIT — DESIGN TOKENS ============ */
:root, :root[data-theme="dark"]{
  color-scheme: dark;
  --page:#070a14; --page-2:#0b1020;
  --surface-1:#141b33; --glass:rgba(14,19,38,.17); --glass-2:rgba(20,27,50,.17);
  --glass-solid:rgba(18,24,46,.9); --glass-raise:rgba(42,52,92,.36);
  --ink-1:#ffffff; --ink-2:#dbe2f4; --ink-3:#a9b4d8;
  --hairline:rgba(255,255,255,.08); --hairline-2:rgba(255,255,255,.14);
  --grid:#262c45; --baseline:#343c5c;
  /* Bureau series (validated dark palette) */
  --exp:#199e70; --equ:#3987e5; --tu:#a855f7;
  /* Status (fixed) */
  --good:#0ca30c; --good-text:#2ecc71; --warn:#fab219; --serious:#ec835a; --crit:#d03b3b; --crit-text:#f0716f;
  --info:#3987e5; --accent:#7aa8ff; --gold:#fab219;
  --shadow:0 18px 50px rgba(0,0,0,.45);
  --r-lg:22px; --r-md:16px; --r-sm:10px;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}
:root[data-theme="light"]{
  color-scheme: light;
  --page:#eef1f8; --page-2:#f7f8fc;
  --surface-1:#ffffff; --glass:rgba(255,255,255,.78); --glass-2:rgba(255,255,255,.6);
  --glass-solid:#ffffff; --glass-raise:rgba(235,239,250,.9);
  --ink-1:#101322; --ink-2:#4a5169; --ink-3:#828aa3;
  --hairline:rgba(16,19,34,.1); --hairline-2:rgba(16,19,34,.16);
  --grid:#e3e6f0; --baseline:#c6cbdd;
  --exp:#0d7a54; --equ:#2a78d6; --tu:#8b3fe0;
  --good:#0a8a0a; --good-text:#0a8a0a; --warn:#b97f00; --serious:#c05a32; --crit:#c62f2f; --crit-text:#c62f2f;
  --info:#2a78d6; --accent:#2a63d6; --gold:#b97f00;
  --shadow:0 18px 40px rgba(30,40,80,.14);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--sans); background:var(--page); color:var(--ink-1);
  min-height:100vh; line-height:1.45; overflow-x:hidden;
}
body::before{
  content:""; position:fixed; inset:0; z-index:-1; pointer-events:none;
  background:
    radial-gradient(1100px 600px at 85% -10%, rgba(57,135,229,.14), transparent 60%),
    radial-gradient(900px 550px at -10% 25%, rgba(168,85,247,.12), transparent 55%),
    linear-gradient(180deg, rgba(7,10,20,.5) 0%, rgba(7,10,20,.6) 52%, rgba(7,10,20,.72) 100%),
    url("bg.jpg") center center / cover no-repeat,
    var(--app-bg, none) center center / cover no-repeat,
    linear-gradient(160deg,var(--page) 0%,var(--page-2) 100%);
}
:root[data-theme="light"] body::before{
  background:
    radial-gradient(1100px 600px at 85% -10%, rgba(42,120,214,.12), transparent 60%),
    radial-gradient(900px 550px at -10% 25%, rgba(139,63,224,.09), transparent 55%),
    linear-gradient(160deg,var(--page) 0%,var(--page-2) 100%);
}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink-1);background:var(--glass-2);border:1px solid var(--hairline-2);border-radius:var(--r-sm);padding:9px 12px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
::placeholder{color:var(--ink-3)}
h1,h2,h3{font-weight:650;letter-spacing:-.01em}
a{color:var(--accent)}

/* ============ LAYOUT ============ */
.app{display:flex;min-height:100vh}
.sidebar{
  width:232px;flex-shrink:0;position:sticky;top:0;height:100vh;padding:20px 14px;
  display:flex;flex-direction:column;gap:4px;border-right:1px solid var(--hairline);
  background:rgba(10,14,28,.5);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
:root[data-theme="light"] .sidebar{background:rgba(255,255,255,.55)}
.brand{display:flex;align-items:center;gap:10px;padding:6px 10px 18px}
.brand-logo{width:38px;height:38px;border-radius:12px;flex-shrink:0;display:grid;place-items:center;font-size:19px;
  background:linear-gradient(135deg,#3987e5,#a855f7);box-shadow:0 6px 18px rgba(88,101,242,.35)}
.brand-name{font-size:15.5px;font-weight:700;line-height:1.15}
.brand-sub{font-size:10.5px;color:var(--ink-3);letter-spacing:.06em;text-transform:uppercase}
.nav-btn{
  display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:12px;
  font-size:13.5px;font-weight:520;color:var(--ink-2);text-align:left;width:100%;transition:background .15s,color .15s;
}
.nav-btn:hover{background:var(--glass-raise);color:var(--ink-1)}
.nav-btn.active{background:linear-gradient(135deg,rgba(57,135,229,.22),rgba(168,85,247,.18));color:var(--ink-1);font-weight:600}
.nav-btn .ico{width:22px;text-align:center;font-size:15px}
.nav-spacer{flex:1}
.sidebar-foot{font-size:10.5px;color:var(--ink-3);padding:10px 12px;line-height:1.5}
.main{flex:1;min-width:0;padding:calc(22px + env(safe-area-inset-top)) clamp(14px,3vw,34px) 96px}
:root[data-theme="dark"] .main{text-shadow:0 1px 3px rgba(0,0,0,.78), 0 0 2px rgba(0,0,0,.55)}

/* ===== readability boost: bigger, bolder, higher-contrast, colored labels ===== */
.topbar .sub{font-size:14px;font-weight:600;color:var(--ink-2)}
.sec-title{font-size:14.5px;color:#b3bdf0;font-weight:700}
.brand-sub{font-size:11px;color:var(--ink-2);font-weight:600}
.acct-sub{font-size:12.5px;font-weight:600;color:var(--ink-2)}
.acct-name{font-size:14px}
.score-meta{font-size:12.5px;font-weight:600}
.score-foot{font-size:12.5px;font-weight:600;color:var(--ink-2)}
.mini-goal .lbl{font-size:12px;font-weight:650;color:var(--ink-2)}
.conf{font-size:11.5px;color:var(--ink-2);font-weight:600}
.card h3{font-size:15.5px}
.factor .fh{font-size:14px}
.factor .weight{font-size:11.5px;color:var(--ink-2);font-weight:650}
.factor .rate{font-size:20px}
.fsub{font-size:13px;font-weight:520;color:var(--ink-1);line-height:1.55}
.tip-row{font-size:14px;font-weight:560;color:var(--ink-1);line-height:1.55}
.sugg-title{font-size:14.5px}
.sugg-body{font-size:13.5px;font-weight:500;color:var(--ink-1);line-height:1.6}
.task-title{font-size:15px;font-weight:640}
.task-meta{font-size:12px;font-weight:600;color:var(--ink-2)}
.goal-sub{font-size:13px;font-weight:560;color:var(--ink-2)}
.goal-next{font-size:13px;font-weight:520;color:var(--ink-1)}
.tbl th{font-size:12px;color:#b3bdf0;font-weight:750}
.tbl td{font-size:14px}
.contact-card .cb,.cb{font-size:13.5px;color:var(--ink-1);font-weight:490}
.crow .ci{font-size:15px}
.est-note{font-size:12.5px;font-weight:520;color:var(--ink-2);line-height:1.6}
.tl-date{font-size:12px;font-weight:700;color:#b3bdf0}
.tl-txt{font-size:14px;font-weight:500}
.tl-tag{font-size:11.5px;color:var(--ink-2)}
.file-row{font-size:13.5px}
.chip{font-size:12.5px;font-weight:600;color:var(--ink-1)}
.msg{font-size:14.5px}
.sidebar-foot{font-size:11px;color:var(--ink-2);font-weight:550}
.search-hit{font-size:13.5px}
.search-hit .sh-s{font-size:12px;color:var(--ink-2)}
.impact-chip{font-size:11px;font-weight:700}
.prio{font-size:10.5px;font-weight:800}
.badge{font-weight:700}
.empty{font-size:14px;font-weight:520;color:var(--ink-2)}
.nav-btn{font-size:14px;font-weight:600}
.sim-toggle{font-size:13px;color:var(--ink-1)}
.sim-row label{font-size:13px;color:var(--ink-1);font-weight:520}
.est-note b{color:var(--ink-1)}
.topbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.topbar h1{font-size:clamp(19px,2.4vw,25px)}
.neon-name{
  font-weight:800;letter-spacing:.3px;
  background:linear-gradient(95deg,var(--exp) 0%,var(--equ) 50%,var(--tu) 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;color:transparent;
  animation:neonPulse 3.4s ease-in-out infinite;
}
@keyframes neonPulse{
  0%,100%{filter:drop-shadow(0 0 4px rgba(25,158,112,.55)) drop-shadow(0 0 10px rgba(57,135,229,.5)) drop-shadow(0 0 18px rgba(168,85,247,.45));}
  50%{filter:drop-shadow(0 0 7px rgba(25,158,112,.75)) drop-shadow(0 0 16px rgba(57,135,229,.65)) drop-shadow(0 0 28px rgba(168,85,247,.6));}
}
@media (prefers-reduced-motion:reduce){ .neon-name{animation:none;filter:drop-shadow(0 0 6px rgba(57,135,229,.5)) drop-shadow(0 0 14px rgba(168,85,247,.45));} }
.topbar .sub{color:var(--ink-3);font-size:12.5px;margin-top:2px}
.top-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.searchbox{position:relative;width:min(320px,42vw)}
.searchbox input{padding-left:34px;background:var(--glass);backdrop-filter:blur(12px)}
.searchbox .mag{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-3);font-size:14px}
.icon-btn{
  width:38px;height:38px;border-radius:12px;display:grid;place-items:center;font-size:16px;
  background:var(--glass);border:1px solid var(--hairline);transition:background .15s;
}
.icon-btn:hover{background:var(--glass-raise)}

/* ============ CARDS & GLASS ============ */
.card{
  background:var(--glass);backdrop-filter:blur(30px) saturate(1.25);-webkit-backdrop-filter:blur(30px) saturate(1.25);
  border:1px solid var(--hairline-2);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow);
}
.card h3{font-size:14.5px;display:flex;align-items:center;gap:8px;margin-bottom:14px}
.card h3 .more{margin-left:auto;font-size:12px;color:var(--accent);font-weight:550;cursor:pointer}
.grid{display:grid;gap:16px}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
.g5{grid-template-columns:repeat(5,1fr)}
.section{margin-bottom:20px}
.sec-title{font-size:13px;font-weight:650;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);margin:26px 0 12px;display:flex;align-items:center;gap:8px}
.sec-title .more{margin-left:auto;text-transform:none;letter-spacing:0;font-size:12px;color:var(--accent);cursor:pointer;font-weight:550}

/* score cards */
.score-card{position:relative;overflow:hidden}
.score-card::before{content:"";position:absolute;inset:0 0 auto;height:3px;background:var(--bc)}
.score-card .bureau{display:flex;align-items:center;gap:8px;font-weight:650;font-size:13.5px}
.score-card .bdot{width:9px;height:9px;border-radius:50%;background:var(--bc)}
.score-big{font-size:46px;font-weight:700;letter-spacing:-.02em;line-height:1;margin:10px 0 2px}
.score-meta{display:flex;gap:8px;align-items:center;font-size:12px;color:var(--ink-2);flex-wrap:wrap}
.delta{font-weight:650;font-size:12px;padding:2px 8px;border-radius:99px}
.delta.up{color:var(--good-text);background:rgba(12,163,12,.14)}
.delta.down{color:var(--crit-text);background:rgba(208,59,59,.14)}
.delta.flat{color:var(--ink-2);background:var(--glass-raise)}
.score-foot{display:flex;justify-content:space-between;font-size:11.5px;color:var(--ink-3);margin-top:10px;gap:6px;flex-wrap:wrap}
.mini-goal{margin-top:12px}
.mini-goal .lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-3);margin-bottom:5px}
.meter{height:7px;border-radius:99px;background:var(--track,rgba(122,168,255,.16));overflow:hidden}
.meter>i{display:block;height:100%;border-radius:99px;background:var(--fill,var(--accent));transition:width .7s cubic-bezier(.2,.8,.2,1)}
.conf{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;color:var(--ink-3)}
.conf .pips{display:inline-flex;gap:2px}
.conf .pips i{width:4px;height:9px;border-radius:2px;background:var(--glass-raise)}
.conf .pips i.on{background:var(--accent)}

/* health ring */
.ring-wrap{display:flex;gap:26px;align-items:center;flex-wrap:wrap}
.ring-svg{flex-shrink:0}
.ring-center{position:relative;width:190px;height:190px;display:grid;place-items:center}
.ring-center svg{position:absolute;inset:0}
.ring-label{text-align:center;position:relative;z-index:1}
.ring-label .pct{font-size:38px;font-weight:700;letter-spacing:-.02em}
.ring-label .st{font-size:13px;font-weight:600;margin-top:2px}
.ring-label .cap{font-size:10.5px;color:var(--ink-3);margin-top:2px}
.ring-tips{flex:1;min-width:220px;display:flex;flex-direction:column;gap:9px}
.tip-row{display:flex;gap:10px;font-size:12.5px;color:var(--ink-2);align-items:flex-start}
.tip-row .ti{flex-shrink:0}

/* factor cards */
.factor{cursor:pointer;transition:transform .15s, border-color .15s}
.factor:hover{transform:translateY(-2px);border-color:var(--hairline-2)}
.factor .fh{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:650}
.factor .weight{margin-left:auto;font-size:10.5px;color:var(--ink-3);background:var(--glass-raise);padding:2px 7px;border-radius:99px;white-space:nowrap}
.factor .rate{font-size:19px;font-weight:700;margin:8px 0 2px}
.factor .fsub{font-size:11px;color:var(--ink-3);line-height:1.45}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:650;padding:2.5px 9px;border-radius:99px}
.badge.good{color:var(--good-text);background:rgba(12,163,12,.13)}
.badge.warn{color:var(--warn);background:rgba(250,178,25,.12)}
.badge.serious{color:var(--serious);background:rgba(236,131,90,.13)}
.badge.crit{color:var(--crit-text);background:rgba(208,59,59,.14)}
.badge.info{color:var(--accent);background:rgba(122,168,255,.13)}
.badge.neutral{color:var(--ink-2);background:var(--glass-raise)}

/* tables & lists */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);text-align:left;padding:8px 10px;border-bottom:1px solid var(--hairline)}
.tbl td{padding:11px 10px;border-bottom:1px solid var(--hairline);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{cursor:pointer;transition:background .12s}
.tbl tbody tr:hover{background:var(--glass-raise)}
.num{font-variant-numeric:tabular-nums}
.acct-name{display:flex;align-items:center;gap:10px;font-weight:600}
.acct-logo{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:16px;flex-shrink:0;background:var(--glass-raise);border:1px solid var(--hairline)}
.acct-sub{font-size:11px;color:var(--ink-3);font-weight:450}
.util-cell{min-width:110px}
.util-cell .lbl{font-size:11px;margin-bottom:4px;display:flex;justify-content:space-between}

/* timeline */
.tl{position:relative;padding-left:24px}
.tl::before{content:"";position:absolute;left:8px;top:6px;bottom:6px;width:1px;background:var(--hairline-2)}
.tl-item{position:relative;padding:0 0 18px 12px}
.tl-item:last-child{padding-bottom:2px}
.tl-dot{position:absolute;left:-24px;top:2px;width:17px;height:17px;border-radius:50%;display:grid;place-items:center;font-size:9px;background:var(--glass-solid);border:1px solid var(--hairline-2)}
.tl-date{font-size:10.5px;color:var(--ink-3);letter-spacing:.03em}
.tl-txt{font-size:13px;margin-top:1px}
.tl-txt b{font-weight:640}
.tl-tag{font-size:10px;color:var(--ink-3)}

/* tasks */
.task-row{display:flex;gap:12px;align-items:flex-start;padding:12px 4px;border-bottom:1px solid var(--hairline)}
.task-row:last-child{border-bottom:none}
.task-check{width:21px;height:21px;border-radius:7px;border:1.5px solid var(--hairline-2);flex-shrink:0;display:grid;place-items:center;font-size:12px;color:#fff;margin-top:1px;transition:all .15s}
.task-check.done{background:var(--good);border-color:var(--good)}
.task-body{flex:1;min-width:0}
.task-title{font-size:13.5px;font-weight:560}
.task-row.done .task-title{text-decoration:line-through;color:var(--ink-3)}
.task-meta{display:flex;gap:7px;margin-top:5px;flex-wrap:wrap;align-items:center;font-size:10.5px;color:var(--ink-3)}
.prio{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;letter-spacing:.04em}
.prio.high{background:rgba(208,59,59,.16);color:var(--crit-text)}
.prio.med{background:rgba(250,178,25,.13);color:var(--warn)}
.prio.low{background:rgba(122,168,255,.12);color:var(--accent)}
.impact-chip{font-size:10px;font-weight:650;color:var(--good-text);background:rgba(12,163,12,.12);padding:2px 7px;border-radius:99px}

/* suggestions */
.sugg{display:flex;gap:13px;padding:14px;border-radius:var(--r-md);background:var(--glass-2);border:1px solid var(--hairline);margin-bottom:10px}
.sugg .rank{font-size:18px;flex-shrink:0}
.sugg-title{font-size:13.5px;font-weight:640}
.sugg-body{font-size:12px;color:var(--ink-2);margin-top:3px;line-height:1.5}
.sugg-meta{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap}
.sugg-actions{margin-top:9px;display:flex;gap:8px}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;padding:8px 15px;border-radius:11px;transition:all .15s;border:1px solid var(--hairline-2);background:var(--glass-raise);color:var(--ink-1)}
.btn:hover{border-color:var(--accent)}
.btn.primary{background:linear-gradient(135deg,#2a63d6,#7b3ff0);border-color:transparent;color:#fff;box-shadow:0 6px 16px rgba(88,101,242,.3)}
.btn.primary:hover{filter:brightness(1.1)}
.btn.ghost{background:transparent}
.btn.sm{padding:5px 11px;font-size:11.5px;border-radius:9px}
.btn.danger{color:var(--crit-text);border-color:rgba(208,59,59,.3)}

/* goals */
.goal-card .gh{display:flex;align-items:center;gap:9px;font-weight:650;font-size:14px}
.goal-pct{margin-left:auto;font-size:13px;font-weight:700;color:var(--accent)}
.goal-sub{font-size:11.5px;color:var(--ink-3);margin-top:3px}
.goal-next{font-size:11.5px;color:var(--ink-2);margin-top:9px;display:flex;gap:7px;align-items:flex-start}

/* contacts */
.contact-card .ch{display:flex;gap:11px;align-items:center}
.contact-card .cb{font-size:12px;color:var(--ink-2);margin-top:10px;display:grid;gap:5px}
.contact-card .cb a{text-decoration:none}
.crow{display:flex;gap:8px;align-items:center}
.crow .ci{width:18px;text-align:center;flex-shrink:0}

/* chat */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 210px);min-height:420px}
.chat-scroll{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding:6px 2px 14px}
.msg{max-width:82%;padding:11px 15px;border-radius:16px;font-size:13.5px;line-height:1.55;white-space:pre-wrap;word-wrap:break-word}
.msg.ai{background:var(--glass-2);border:1px solid var(--hairline);align-self:flex-start;border-bottom-left-radius:5px}
.msg.me{background:linear-gradient(135deg,#2a63d6,#7b3ff0);color:#fff;align-self:flex-end;border-bottom-right-radius:5px}
.msg .mtag{display:block;font-size:10px;opacity:.65;margin-bottom:4px;letter-spacing:.05em;text-transform:uppercase}
.chat-input{display:flex;gap:9px;padding-top:12px;border-top:1px solid var(--hairline)}
.chat-input input{flex:1}
.chips{display:flex;gap:7px;flex-wrap:wrap;padding:9px 0 2px}
.chip{font-size:11px;padding:5px 11px;border-radius:99px;background:var(--glass-raise);border:1px solid var(--hairline);color:var(--ink-2);cursor:pointer;transition:all .15s}
.chip:hover{color:var(--ink-1);border-color:var(--accent)}

/* simulator */
.sim-controls{display:grid;gap:14px}
.sim-row{display:grid;gap:6px}
.sim-row label{font-size:12px;color:var(--ink-2);display:flex;justify-content:space-between}
.sim-row label b{color:var(--ink-1)}
input[type=range]{-webkit-appearance:none;appearance:none;height:6px;border-radius:99px;background:var(--glass-raise);padding:0;border:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:19px;height:19px;border-radius:50%;background:#fff;border:5px solid var(--accent);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.sim-toggle{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--ink-2);cursor:pointer}
.sim-toggle input{width:auto}
.sim-result{text-align:center;padding:10px 0 4px}
.sim-result .snum{font-size:52px;font-weight:700;letter-spacing:-.02em}
.sim-result .sd{font-size:13px;font-weight:650;margin-top:2px}
.est-note{font-size:10.5px;color:var(--ink-3);margin-top:10px;line-height:1.5;text-align:center}

/* files */
.dropzone{border:1.5px dashed var(--hairline-2);border-radius:var(--r-lg);padding:34px 20px;text-align:center;color:var(--ink-2);transition:all .2s;cursor:pointer}
.dropzone.drag{border-color:var(--accent);background:rgba(122,168,255,.06)}
.dz-ico{font-size:30px;margin-bottom:8px}
.file-row{display:flex;gap:11px;align-items:center;padding:11px 4px;border-bottom:1px solid var(--hairline);font-size:13px}
.file-row:last-child{border-bottom:none}
.file-ico{width:34px;height:34px;border-radius:10px;background:var(--glass-raise);display:grid;place-items:center;font-size:15px;flex-shrink:0}

/* modal */
.modal-veil{position:fixed;inset:0;background:rgba(4,6,14,.66);backdrop-filter:blur(6px);z-index:60;display:grid;place-items:center;padding:18px;animation:fade .18s}
.modal{width:min(560px,100%);max-height:88vh;overflow-y:auto;background:var(--glass-solid);border:1px solid var(--hairline-2);border-radius:var(--r-lg);padding:22px;box-shadow:var(--shadow)}
.modal h2{font-size:16.5px;margin-bottom:14px;display:flex;align-items:center;gap:9px}
.modal h2 .x{margin-left:auto;font-size:18px;color:var(--ink-3);cursor:pointer}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.form-grid .full{grid-column:1/-1}
.fld label{display:block;font-size:11px;color:var(--ink-3);margin-bottom:4px;font-weight:550}
.modal-foot{display:flex;gap:9px;justify-content:flex-end;margin-top:17px}

/* search overlay */
.search-hit{padding:11px 13px;border-radius:12px;cursor:pointer;display:flex;gap:11px;align-items:center;font-size:13px}
.search-hit:hover,.search-hit.sel{background:var(--glass-raise)}
.search-hit .sh-t{font-weight:600}
.search-hit .sh-s{font-size:11px;color:var(--ink-3)}
.search-hit .sh-k{margin-left:auto;font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;flex-shrink:0}

/* toast */
.toasts{position:fixed;bottom:22px;right:22px;z-index:90;display:flex;flex-direction:column;gap:9px;max-width:min(340px,86vw)}
.toast{background:var(--glass-solid);border:1px solid var(--hairline-2);border-left:3px solid var(--accent);border-radius:14px;padding:12px 15px;font-size:12.5px;box-shadow:var(--shadow);animation:slideIn .25s cubic-bezier(.2,.8,.2,1)}
.toast.good{border-left-color:var(--good)}
.toast.warn{border-left-color:var(--warn)}
.toast.crit{border-left-color:var(--crit)}
.toast b{display:block;font-size:12.5px;margin-bottom:1px}
.toast span{color:var(--ink-2);font-size:11.5px}

/* tooltip for charts */
.viz-tip{position:fixed;z-index:80;pointer-events:none;background:var(--glass-solid);border:1px solid var(--hairline-2);border-radius:11px;padding:9px 12px;font-size:11.5px;box-shadow:var(--shadow);display:none;min-width:130px}
.viz-tip .vt-d{color:var(--ink-3);font-size:10px;letter-spacing:.04em;text-transform:uppercase;margin-bottom:5px}
.vt-row{display:flex;align-items:center;gap:7px;margin-top:3px}
.vt-row .sw{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.vt-row .vv{margin-left:auto;font-weight:650;font-variant-numeric:tabular-nums}

/* celebration */
.confetti{position:fixed;inset:0;pointer-events:none;z-index:95;overflow:hidden}
.confetti i{position:absolute;top:-14px;width:9px;height:14px;border-radius:2px;animation:drop 2.6s ease-in forwards}
@keyframes drop{to{transform:translateY(105vh) rotate(720deg);opacity:.2}}
@keyframes fade{from{opacity:0}}
@keyframes slideIn{from{transform:translateX(30px);opacity:0}}
@keyframes pop{0%{transform:scale(.94);opacity:0}100%{transform:scale(1);opacity:1}}
.pop{animation:pop .25s cubic-bezier(.2,.8,.2,1)}

/* empty state */
.empty{padding:30px 14px;text-align:center;color:var(--ink-3);font-size:13px}
.empty .e-ico{font-size:28px;margin-bottom:7px}

/* mobile */
.bottom-nav{display:none}
@media(max-width:1060px){
  .g5{grid-template-columns:repeat(3,1fr)}
  .g3{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:760px){
  .sidebar{display:none}
  .main{padding:16px 14px 110px}
  .g3,.g2,.g5{grid-template-columns:1fr}
  .g5{grid-template-columns:repeat(2,1fr)}
  .searchbox{width:100%;order:5}
  .topbar{gap:10px}
  .bottom-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;z-index:50;
    background:rgba(10,14,28,.82);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
    border-top:1px solid var(--hairline);padding:7px 4px calc(7px + env(safe-area-inset-bottom));
    justify-content:flex-start;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;
  }
  .bottom-nav::-webkit-scrollbar{display:none}
  :root[data-theme="light"] .bottom-nav{background:rgba(255,255,255,.85)}
  .bn-btn{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;color:var(--ink-3);padding:4px 8px;border-radius:10px;min-width:52px}
  .bn-btn .ico{font-size:18px}
  .bn-btn.active{color:var(--accent)}
  .form-grid{grid-template-columns:1fr}
  .chat-wrap{height:calc(100vh - 250px)}
  .tbl .hide-m{display:none}
  .score-big{font-size:38px}
}
@media(min-width:761px) and (max-width:1060px){ .tbl .hide-t{display:none} }
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--glass-raise);border-radius:99px}
::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar" id="topbar"></div>
    <div id="view"></div>
  </main>
</div>
<nav class="bottom-nav" id="bottomnav"></nav>
<div class="toasts" id="toasts"></div>
<div class="viz-tip" id="viztip"></div>
<div id="modal-root"></div>
<div id="confetti-root"></div>

    const fresh = defaultState();
    (saved.contacts||[]).forEach(c=>{
      c.links = c.links||[]; c.addresses = c.addresses||[]; c.attachments = c.attachments||[]; c.email = c.email||'';
      const seed = fresh.contacts.find(f=>f.name===c.name);
      if(seed){
        if(!c.links.length) c.links = seed.links;
        if(!c.addresses.length) c.addresses = seed.addresses;
        if(!c.attachments.length) c.attachments = seed.attachments;
      }
    });
    saved.version = 4;
  }
  const out = (saved && saved.version === 5) ? saved : defaultState();
  // normalize: every mail item carries a department field; backfill known bureaus once
  (out.mail||[]).forEach(m=>{
    if(!('dept' in m)){
      m.dept = /equifax/i.test(m.to||m.bureau||'') ? 'Consumer Dispute Department'
             : /experian/i.test(m.to||m.bureau||'') ? 'Consumer Assistance Center'
             : /transunion/i.test(m.to||m.bureau||'') ? 'Consumer Dispute Center'
             : '';
    }
  });
  return out;
})();

function persist(snapshotLabel){
  S.savedAt = new Date().toISOString();
  if(snapshotLabel){
    S.history.unshift({ at:S.savedAt, label:snapshotLabel });
    S.history = S.history.slice(0,25);
  }
  Store.save(S);
  if(window.CloudPush) window.CloudPush();
  const el = document.getElementById('savestamp');
  if(el) el.textContent = '☁️ Saved ' + fmtTime(new Date());
}

/* attachment source resolver — inline dataUrl or cloud blob */
function attSrc(a){ return (a && (a.dataUrl || (a.blobId && window.BLOBS && window.BLOBS[a.blobId]))) || null; }

/* ---------- helpers ---------- */
const $ = sel => document.querySelector(sel);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt$ = n => '$' + Number(n||0).toLocaleString('en-US',{maximumFractionDigits: (n%1===0?0:2)});
const fmtPct = n => (Math.round(n*10)/10) + '%';
function fmtDate(d){ if(!d) return '—'; const dt = new Date(d + (d.length===10?'T12:00:00':'')); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year: dt.getFullYear()===2026?undefined:'numeric'}); }
function fmtTime(d){ return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function uid(p){ return p + Math.random().toString(36).slice(2,8); }
function clamp(n,a,b){ return Math.max(a,Math.min(b,n)); }

const BUREAUS = [
  { key:'equifax',    label:'Equifax',    dot:'🔵', var:'--equ' },
  { key:'experian',   label:'Experian',   dot:'🟢', var:'--exp' },
  { key:'transunion', label:'TransUnion', dot:'🟣', var:'--tu'  }
];
/* display order on cards: Experian, Equifax, TransUnion */
const BUREAU_CARDS = ['experian','equifax','transunion'];
const BMETA = {
  experian:{ label:'Experian', dot:'🟢', color:()=>cssVar('--exp') },
  equifax:{ label:'Equifax', dot:'🔵', color:()=>cssVar('--equ') },
  transunion:{ label:'TransUnion', dot:'🟣', color:()=>cssVar('--tu') }
};
function cssVar(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

/* ---------- derived credit math ---------- */
function isRevolving(a){ return ['Credit Card','Authorized User','Charge Card'].includes(a.type); }
function isOpenAcct(a){ return !/closed|charge-off/i.test(a.status); }
function revolvers(){ return S.accounts.filter(a=>isRevolving(a) && a.limit>0 && isOpenAcct(a)); }
function derogs(){ return S.accounts.filter(a=>/charge-off|collection/i.test(a.status)); }
function unpaidDerogs(){ return derogs().filter(a=>a.balance>0); }
function totalUtil(){
  const r = revolvers();
  const bal = r.reduce((s,a)=>s+a.balance,0), lim = r.reduce((s,a)=>s+a.limit,0);
  return lim? (bal/lim*100) : 0;
}
function acctUtil(a){ return a.limit? (a.balance/a.limit*100) : 0; }
function avgScore(){ return Math.round((S.scores.experian.current + S.scores.equifax.current + S.scores.transunion.current)/3); }
function hasCollections(){ return unpaidDerogs().length>0; }
function utilBadge(u){ return u<10?['Excellent','good'] : u<30?['Good','info'] : u<50?['Fair','warn'] : u<75?['High','serious'] : ['Critical','crit']; }
function scoreBand(s){ return s>=800?['Exceptional','good'] : s>=740?['Very Good','good'] : s>=670?['Good','info'] : s>=580?['Fair','warn'] : ['Poor','crit']; }
function healthPct(){
  let pct = (avgScore()-300)/(850-300)*100;
  const u = totalUtil();
  pct += u<10?8 : u<30?4 : u<50?-4 : -10;
  pct -= Math.min(12, unpaidDerogs().length * 4);
  return clamp(Math.round(pct),0,100);
}
function healthLabel(p){ return p>=75?['💚 Excellent','var(--good-text)'] : p>=58?['💛 Good','var(--warn)'] : p>=42?['🧡 Fair','var(--serious)'] : ['❤️ Needs Attention','var(--crit-text)']; }

/* FICO factor assessment (rule-based, driven by the real file) */
function factors(){
  const u = totalUtil();
  const nDerog = derogs().length, nUnpaid = unpaidDerogs().length;
  const ages = S.accounts.filter(a=>a.opened).map(a=>{
    const [y,m]=a.opened.split('-').map(Number); return (2026-y)*12 + (7-(m||1));
  });
  const avgAge = ages.length? ages.reduce((a,b)=>a+b,0)/ages.length/12 : 0;
  const types = new Set(S.accounts.filter(a=>a.type!=='Collection').map(a=>isRevolving(a)?'rev':'inst'));
  const inqNote = 'Dec 2025 auto-shopping cluster stops being scored Dec 2026.';
  return [
    { key:'history', emoji:'🟢', name:'Payment History', weight:'35%',
      rating: nUnpaid?'Poor':'Rebuilding', tone: nUnpaid?'crit':'warn',
      sub: nUnpaid? `${nUnpaid} unpaid derogatorie${nUnpaid===1?'y':'s'} (AT&T · Snap-On · Navient) + 2025 late marks. Every clean month now outweighs the past a little more.` : 'Derogatories resolved — clean months are compounding now.',
      plan:'Disputes 30 days · settlements 60–90', gain: nUnpaid?'+40–80 pts over 6–12 mo':'+10–20 pts' },
    { key:'util', emoji:'🟡', name:'Utilization', weight:'30%',
      rating: u<10?'Excellent (pending)':u<30?'Good':u<50?'Fair':'Poor', tone: u<10?'good':u<30?'info':u<50?'warn':'crit',
      sub:`Live balances: ${fmtPct(u)} 🎉 — but bureaus still show June statements at 87–101% on the Cap One cards. The fix already happened; it reports with the next statements.`,
      plan:'Next statement cycle → ~30 days', gain:'+20–40 pts' },
    { key:'age', emoji:'🔵', name:'Length of Credit', weight:'15%',
      rating: avgAge>=8?'Very Good':avgAge>=5?'Good':avgAge>=3?'Fair':'Short', tone: avgAge>=5?'good':avgAge>=3?'info':'warn',
      sub:`Average age ≈ ${avgAge.toFixed(1)} yrs (2009 student loans + 2019 AU anchor a young revolving file). Don’t close old accounts.`,
      plan:'Passive — grows monthly', gain:'+1–2 pts / 6 mo' },
    { key:'mix', emoji:'🟣', name:'Credit Mix', weight:'10%',
      rating: types.size>=2?'Very Good':'Thin', tone: types.size>=2?'good':'warn',
      sub: 'Cards + installment loans ✔. Mix is a strength on all three bureaus (report confirmed “Very Good”).',
      plan:'No action', gain:'maintained' },
    { key:'new', emoji:'🟠', name:'New Credit', weight:'10%',
      rating:'Recovering', tone:'warn',
      sub:`15 inquiries in 12 mo (Dec 2025 auto shopping — FICO scores a shopping window as one, but it’s still a young-file drag). ${inqNote}`,
      plan:'Zero applications until 2027', gain:'+5–15 pts by Jan 2027' }
  ];
}

/* suggestion engine — profile-aware */
function suggestions(){

    impact:'+25–55 pts EQU', diff:'Medium', time:'45 min to file', cost:'$0', act:null });

    impact:'+20–40 pts', diff:'Easy', time:'Wait ~2–4 weeks', cost:'$0', act:{type:'task', title:'Verify July statement balances reported low', emoji:'📊', prio:'med', impact:'+20–40 pts'} });
  revolvers().filter(a=>acctUtil(a)>=40).forEach(a=>{

  });
  out.push({ rank:'⚡', level:'Medium Impact', title:'Snap-On Credit: written settlement with deletion',
    body:'$4,141 unpaid charge-off re-reporting monthly on all three bureaus — every month it re-reports, it stays "recent". A written settlement (start ~40%) with deletion as an explicit condition stops the bleeding. Nothing by phone.',
    impact:'+15–30 pts over time', diff:'Hard', time:'30–90 days', cost:'~$1,650–2,500', act:{type:'task', title:'Draft Snap-On settlement letter', emoji:'📬', prio:'med', impact:'+15–30 pts'} });
  out.push({ rank:'⚡', level:'Medium Impact', title:'Goodwill-deletion letters for the PAID charge-offs',
    body:'Current and Grow Credit are both paid ($0). Paid derogs are the easiest goodwill wins — Grow’s whole history was $38. Short letter, take responsibility, cite the paid status, ask for a one-time courtesy deletion.',
    impact:'+10–20 pts if deleted', diff:'Easy', time:'1 hour', cost:'$0', act:{type:'task', title:'Mail goodwill letters (Current, Grow)', emoji:'💌', prio:'med', impact:'+10–20 pts'} });
  out.push({ rank:'💡', level:'Small Improvement', title:'Autopay minimums on everything that bills',
    body:'The Aug 2025 Aidvantage 180-day marks and the fall 2025 Cap One streak did most of today’s damage. Autopay-minimum makes a repeat impossible. One new 30-day late would cost 40–80 points at this stage.',
    impact:'protects everything', diff:'Easy', time:'20 minutes', cost:'$0', act:null });
  out.push({ rank:'💡', level:'Small Improvement', title:'Capital One graduation + CLI ask in August',
    body:'Both cards clean since Feb 2026 = 6 months in August. Ask about Platinum Secured graduation (deposit back, unsecured) and a Quicksilver CLI — soft pull, and a higher limit lowers utilization for free.',
    impact:'+5–15 pts', diff:'Easy', time:'10 minutes', cost:'$0', act:{type:'task', title:'Call Capital One re: graduation + CLI', emoji:'📞', prio:'low', impact:'+5–15 pts'} });
  return out;
}

<script>
/* ================================================================
   CHARTS — inline SVG per dataviz specs (2px lines, ≥8px markers,
   surface rings, hairline grid, tooltip layer, no dual axes)
   ================================================================ */
function sparkline(data, color, w=150, h=42, surface){
  surface = surface || 'var(--surface-1)';
  const min = Math.min(...data), max = Math.max(...data), pad = 4;
  const range = (max-min)||1;
  const pts = data.map((v,i)=>[ pad + i*(w-2*pad)/(data.length-1), h-pad - (v-min)/range*(h-2*pad) ]);
  const path = pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area = path + ` L${pts[pts.length-1][0].toFixed(1)} ${h} L${pts[0][0].toFixed(1)} ${h} Z`;
  const [ex,ey] = pts[pts.length-1];
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" aria-hidden="true" style="display:block;overflow:visible">
    <path d="${area}" fill="${color}" opacity="0.10"/>
    <path d="${path}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${ex}" cy="${ey}" r="5.5" fill="${surface}"/>
    <circle cx="${ex}" cy="${ey}" r="4" fill="${color}"/>
  </svg>`;
}

/* Big 3-series trend chart with crosshair + tooltip */
function trendChart(){
  const w=760, h=250, padL=42, padR=96, padT=14, padB=26;
  const months = S.scoreMonths;
  const series = BUREAU_CARDS.map(k=>({ key:k, label:BMETA[k].label, color:`var(${k==='experian'?'--exp':k==='equifax'?'--equ':'--tu'})`, data:S.scores[k].history }));
  const all = series.flatMap(s=>s.data);
  let min = Math.floor(Math.min(...all)/20)*20, max = Math.ceil(Math.max(...all)/20)*20;
  if(max-min<40){max=min+40;}
  const X = i => padL + i*(w-padL-padR)/(months.length-1);
  const Y = v => padT + (max-v)/(max-min)*(h-padT-padB);
  let grid='', yl='';
  for(let v=min; v<=max; v+=20){
    grid += `<line x1="${padL}" x2="${w-padR}" y1="${Y(v)}" y2="${Y(v)}" stroke="var(--grid)" stroke-width="1"/>`;
    yl += `<text x="${padL-8}" y="${Y(v)+3.5}" text-anchor="end" font-size="10" fill="var(--ink-3)" style="font-variant-numeric:tabular-nums">${v}</text>`;
  }
  let xl='';
  months.forEach((m,i)=>{ if(i%2===0||i===months.length-1) xl += `<text x="${X(i)}" y="${h-6}" text-anchor="middle" font-size="10" fill="var(--ink-3)">${m}</text>`; });
  let paths='', ends='', labels='';
  // sort end labels by final value to prevent collisions
  const endSorted = [...series].sort((a,b)=> b.data[b.data.length-1]-a.data[a.data.length-1]);
  const lYs=[]; endSorted.forEach(s=>{
    let y = Y(s.data[s.data.length-1]);
    while(lYs.some(v=>Math.abs(v-y)<15)) y+=15;
    lYs.push(y); s._ly = y;
  });
  series.forEach(s=>{
    const d = s.data.map((v,i)=>(i?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)).join(' ');
    paths += `<path d="${d}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
    const ex=X(s.data.length-1), ey=Y(s.data[s.data.length-1]);
    ends += `<circle cx="${ex}" cy="${ey}" r="6" fill="var(--surface-1)"/><circle cx="${ex}" cy="${ey}" r="4.5" fill="${s.color}"/>`;
    if(Math.abs(s._ly-ey)>7) labels += `<line x1="${ex+7}" y1="${ey}" x2="${w-padR+16}" y2="${s._ly}" stroke="var(--baseline)" stroke-width="1"/>`;
    labels += `<circle cx="${w-padR+22}" cy="${s._ly}" r="3.5" fill="${s.color}"/>
      <text x="${w-padR+30}" y="${s._ly+3.5}" font-size="11" font-weight="600" fill="var(--ink-1)" style="font-variant-numeric:tabular-nums">${s.data[s.data.length-1]}</text>
      <text x="${w-padR+30}" y="${s._ly+15}" font-size="9" fill="var(--ink-3)">${s.label}</text>`;
  });
  return `<div style="overflow-x:auto">
    <svg id="trendsvg" width="100%" viewBox="0 0 ${w} ${h}" style="min-width:560px;display:block" role="img" aria-label="12-month FICO score trend for Experian, Equifax and TransUnion"
      data-months='${JSON.stringify(months)}' data-min="${min}" data-max="${max}" data-padl="${padL}" data-padr="${padR}" data-padt="${padT}" data-padb="${padB}" data-w="${w}" data-h="${h}">
      ${grid}
      <line x1="${padL}" x2="${w-padR}" y1="${Y(min)}" y2="${Y(min)}" stroke="var(--baseline)" stroke-width="1"/>
      ${yl}${xl}
      <line id="crosshair" y1="${padT}" y2="${h-padB}" stroke="var(--baseline)" stroke-width="1" opacity="0"/>
      ${paths}${ends}${labels}
      <g id="hoverdots"></g>
      <rect x="${padL}" y="${padT}" width="${w-padL-padR}" height="${h-padT-padB}" fill="transparent" id="trendhit"/>
    </svg></div>
    <div style="display:flex;gap:16px;margin-top:10px;flex-wrap:wrap" aria-hidden="false">
      ${series.map(s=>`<span style="display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-2)"><i style="width:9px;height:9px;border-radius:50%;background:${s.color};display:inline-block"></i>${s.label}</span>`).join('')}
    </div>`;
}
function bindTrendHover(){
  const svg = $('#trendsvg'); if(!svg) return;
  const tip = $('#viztip');
  const months = JSON.parse(svg.dataset.months);
  const {min,max,padl,padr,padt,padb,w,h} = Object.fromEntries(Object.entries(svg.dataset).map(([k,v])=>[k,isNaN(+v)?v:+v]));
  const X = i => padl + i*(w-padl-padr)/(months.length-1);
  const Y = v => padt + (max-v)/(max-min)*(h-padt-padb);
  const hit = svg.querySelector('#trendhit'), cross = svg.querySelector('#crosshair'), dots = svg.querySelector('#hoverdots');
  function show(e){
    const r = svg.getBoundingClientRect();
    const sx = (e.clientX-r.left)/r.width*w;
    const i = clamp(Math.round((sx-padl)/((w-padl-padr)/(months.length-1))),0,months.length-1);
    cross.setAttribute('x1',X(i)); cross.setAttribute('x2',X(i)); cross.setAttribute('opacity','1');
    dots.innerHTML = BUREAU_CARDS.map(k=>{
      const v=S.scores[k].history[i], c = k==='experian'?'var(--exp)':k==='equifax'?'var(--equ)':'var(--tu)';
      return `<circle cx="${X(i)}" cy="${Y(v)}" r="6.5" fill="var(--surface-1)"/><circle cx="${X(i)}" cy="${Y(v)}" r="4.5" fill="${c}"/>`;
    }).join('');
    tip.style.display='block';
    tip.innerHTML = `<div class="vt-d">${months[i]}</div>` + BUREAU_CARDS.map(k=>{
      const c = k==='experian'?'var(--exp)':k==='equifax'?'var(--equ)':'var(--tu)';
      return `<div class="vt-row"><span class="sw" style="background:${c}"></span>${BMETA[k].label}<span class="vv">${S.scores[k].history[i]}</span></div>`;
    }).join('');
    const tw = tip.offsetWidth;
    let left = e.clientX+14; if(left+tw > window.innerWidth-10) left = e.clientX-tw-14;
    tip.style.left = left+'px'; tip.style.top = Math.max(10,e.clientY-30)+'px';
  }
  function hide(){ tip.style.display='none'; cross.setAttribute('opacity','0'); dots.innerHTML=''; }
  hit.addEventListener('mousemove',show);
  hit.addEventListener('mouseleave',hide);
  hit.addEventListener('touchstart',e=>{ if(e.touches[0]) show(e.touches[0]); },{passive:true});
  hit.addEventListener('touchmove',e=>{ if(e.touches[0]) show(e.touches[0]); },{passive:true});
  hit.addEventListener('touchend',hide);
}

/* health ring gauge */
function healthRing(){
  const pct = healthPct();
  const [lbl,color] = healthLabel(pct);
  const R=78, C=2*Math.PI*R, off = C*(1-pct/100);
  return `
  <div class="ring-center">
    <svg width="190" height="190" viewBox="0 0 190 190">
      <circle cx="95" cy="95" r="${R}" fill="none" stroke="var(--glass-raise)" stroke-width="13"/>
      <circle cx="95" cy="95" r="${R}" fill="none" stroke="${color.startsWith('var')?color:'var(--accent)'}" stroke-width="13"
        stroke-linecap="round" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${C.toFixed(1)}"
        transform="rotate(-90 95 95)" style="transition:stroke-dashoffset 1.1s cubic-bezier(.2,.8,.2,1)" id="ringarc"/>
    </svg>
    <div class="ring-label">
      <div class="pct">${pct}<span style="font-size:19px;color:var(--ink-3)">%</span></div>
      <div class="st" style="color:${color}">${lbl}</div>
      <div class="cap">Overall credit health</div>
    </div>
  </div>`;
}
function animateRing(){
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const a = document.getElementById('ringarc'); if(!a) return;
    const pct = healthPct(), R=78, C=2*Math.PI*R;
    a.style.strokeDashoffset = (C*(1-pct/100)).toFixed(1);
  }));
}
function utilBar(u, small){
  const [,tone] = utilBadge(u);
  const fill = tone==='good'?'var(--good)':tone==='info'?'var(--info)':tone==='warn'?'var(--warn)':tone==='serious'?'var(--serious)':'var(--crit)';
  const track = tone==='good'?'rgba(12,163,12,.15)':tone==='info'?'rgba(57,135,229,.15)':tone==='warn'?'rgba(250,178,25,.14)':tone==='serious'?'rgba(236,131,90,.15)':'rgba(208,59,59,.16)';
  return `<div class="meter" style="--track:${track};${small?'height:5px':''}"><i style="width:${clamp(u,0,100)}%;--fill:${fill};background:${fill}"></i></div>`;
}

function topbarHTML(title, sub, extra){

function importData(input){
  const f = input.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    try{
      const d = JSON.parse(r.result);
      if(!d.scores || !d.accounts) throw new Error('bad');
      S = d; persist('Imported data file'); closeModal(); render();
      toast('☁️ Import complete','Your data is loaded and saved','good');
    }catch(e){ toast('⚠️ Import failed','That file isn’t a Centauri Credit export','warn'); }

  r.readAsText(f);
}

function searchIndex(){
  const ix = [];
  S.accounts.forEach(a=>ix.push({k:'Account', t:`${a.emoji} ${a.name}`, s:`${a.type} · ${fmt$(a.balance)} balance`, blob:`${a.name} ${a.nickname} ${a.type} ${a.notes}`, go:()=>{go('accounts');setTimeout(()=>openAccount(a.id),60);}}));
  S.tasks.forEach(t=>ix.push({k:'Task', t:`${t.emoji} ${t.title}`, s:`${t.prio} priority · due ${fmtDate(t.due)}`, blob:`${t.title} ${t.note}`, go:()=>go('tasks')}));
  S.contacts.forEach(c=>ix.push({k:'Contact', t:`${c.emoji} ${c.name}`, s:`${c.kind} · ${c.phone}`,
    blob:`${c.name} ${c.kind} ${c.notes} ${c.rep} ${(c.links||[]).map(l=>l.label+' '+l.url).join(' ')} ${(c.addresses||[]).map(a=>a.label+' '+a.text).join(' ')} ${(c.attachments||[]).map(a=>a.name).join(' ')}`,
    go:()=>go('contacts')}));
  S.timeline.forEach(e=>ix.push({k:'Timeline', t:`${e.emoji} ${e.text.replace(/<[^>]+>/g,'')}`, s:fmtDate(e.date)+' · '+e.tag, blob:e.text+' '+e.tag, go:()=>go('timeline')}));
  S.goals.forEach(g=>ix.push({k:'Goal', t:`${g.emoji} ${g.title}`, s:g.note, blob:`${g.title} ${g.note} ${g.actions}`, go:()=>go('goals')}));
  S.files.forEach(f=>ix.push({k:'Document', t:`${f.emoji} ${f.name}`, s:`${f.kind} · ${fmtDate(f.date)}`, blob:`${f.name} ${f.kind} ${f.extract}`, go:()=>go('files')}));
  (S.mail||[]).forEach(m=>ix.push({k:'Dispute', t:`📬 ${m.title}`, s:`${m.kind} · ${mailStage(m.status).label}${m.tracking?' · '+m.tracking:''}`, blob:`${m.title} ${m.kind} ${m.to} ${m.toAddress} ${m.tracking} ${m.notes}`, go:()=>go('mail')}));
  S.chat.forEach(m=>{ if(m.who==='me') ix.push({k:'AI chat', t:'💬 '+m.text.slice(0,70), s:'Centauri AI conversation', blob:m.text, go:()=>go('ai')}); });
  return ix;
}
function bindSearch(){
  const inp = $('#globalsearch'); if(!inp) return;
  let box;
  function close(){ if(box){box.remove(); box=null;} }
  inp.addEventListener('input', ()=>{
    const q = inp.value.trim().toLowerCase(); close();
    if(q.length<2) return;
    const hits = searchIndex().filter(x=>x.blob.toLowerCase().includes(q)).slice(0,9);
    box = document.createElement('div');
    box.className='card';
    box.style.cssText='position:absolute;top:44px;left:0;right:0;z-index:70;padding:8px;max-height:380px;overflow-y:auto';
    box.innerHTML = hits.length? hits.map((h,i)=>`<div class="search-hit" data-i="${i}"><div><div class="sh-t">${esc(h.t).slice(0,90)}</div><div class="sh-s">${esc(h.s)}</div></div><span class="sh-k">${h.k}</span></div>`).join('')
      : `<div class="empty" style="padding:16px">No matches for “${esc(q)}”</div>`;
    box.querySelectorAll('.search-hit').forEach((el,i)=>el.addEventListener('mousedown',e=>{ e.preventDefault(); hits[i].go(); close(); }));
    inp.parentElement.appendChild(box);
  });
  inp.addEventListener('blur', ()=>setTimeout(close,180));
  inp.addEventListener('keydown', e=>{ if(e.key==='Escape'){inp.value=''; close(); inp.blur();} });
}
document.addEventListener('keydown', e=>{
  if(e.key==='/' && !/INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName)){ e.preventDefault(); const s=$('#globalsearch'); if(s) s.focus(); }
});

function estimateGain(){

function promptPayment(id){
  const a = S.accounts.find(x=>x.id===id);
  const amt = prompt(`How much did you pay toward ${a.name}?`, Math.min(a.balance, 100));
  if(amt===null) return;
  applyPayment(a, parseFloat(amt)||0, true);
  closeModal(); render();
}
function applyPayment(a, amt, fromUI){
  const before = totalUtil();
  a.balance = Math.max(0, a.balance - amt);
  const after = totalUtil();
  const gain = estimatePaymentGain(before, after);
  addEvent('💰', `<b>Payment logged:</b> ${fmt$(amt)} to ${esc(a.name)}. Balance now ${fmt$(a.balance)}.`, 'Payment');
  const t = S.tasks.find(t=>!t.done && t.title.toLowerCase().includes(a.name.split(' ')[0].toLowerCase()) && /pay/i.test(t.title));
  if(t){ t.done = true; addEvent('✅', `<b>Task completed:</b> ${esc(t.title)}`, 'Task'); }
  persist(`Payment ${fmt$(amt)} → ${a.name}`);
  if(a.balance===0){ celebrate(); toast('🚀 Milestone!', `${a.name} is PAID OFF. Estimated impact ${gain}`, 'good'); addEvent('🎉',`<b>${esc(a.name)} paid off!</b> Reported utilization will drop next statement.`,'Milestone'); }
  else toast('💰 Payment saved', `Utilization ${fmtPct(before)} → ${fmtPct(after)} · est. ${gain}`, 'good');
  return gain;
}
function estimatePaymentGain(before, after){
  const bands = u => u<10?4:u<30?3:u<50?2:u<75?1:0;
  const jump = bands(after)-bands(before);
  return jump>=2? '+15–30 pts' : jump===1? '+8–18 pts' : '+2–8 pts';
}

  CC.editC.links.forEach((l,i)=>{ const a=$('#lk-l-'+i), b=$('#lk-u-'+i); if(a) l.label=a.value; if(b) l.url=b.value; });
  CC.editC.addresses.forEach((a,i)=>{ const x=$('#ad-l-'+i), y=$('#ad-t-'+i); if(x) a.label=x.value; if(y) a.text=y.value; });
}
function renderContactForm(){

  <div class="fld full" style="margin-top:14px"><label>🔗 Links</label>
    ${c.links.map((l,i)=>`<div style="display:flex;gap:7px;margin-bottom:7px">
      <input id="lk-l-${i}" value="${esc(l.label||'')}" placeholder="Label (e.g. Dispute portal)" style="flex:2">
      <input id="lk-u-${i}" value="${esc(l.url||'')}" placeholder="https://…" style="flex:3">
      <button class="icon-btn" style="width:34px;height:34px;flex-shrink:0" onclick="syncContactForm();CC.editC.links.splice(${i},1);renderContactForm()">✕</button></div>`).join('')}
    <button class="btn sm" onclick="syncContactForm();CC.editC.links.push({label:'',url:''});renderContactForm()">➕ Add link</button>
  </div>

  <div class="fld full" style="margin-top:12px"><label>✉️ Mailing addresses</label>
    ${c.addresses.map((a,i)=>`<div style="display:flex;gap:7px;margin-bottom:7px">
      <input id="ad-l-${i}" value="${esc(a.label||'')}" placeholder="Label (e.g. Disputes)" style="flex:2">
      <textarea id="ad-t-${i}" rows="2" placeholder="Company, P.O. Box…, City, ST ZIP" style="flex:3">${esc(a.text||'')}</textarea>
      <button class="icon-btn" style="width:34px;height:34px;flex-shrink:0" onclick="syncContactForm();CC.editC.addresses.splice(${i},1);renderContactForm()">✕</button></div>`).join('')}
    <button class="btn sm" onclick="syncContactForm();CC.editC.addresses.push({label:'',text:''});renderContactForm()">➕ Add address</button>
  </div>

  <div class="fld full" style="margin-top:12px"><label>📎 Files & screenshots</label>
    ${c.attachments.map((a,i)=>`<div style="display:flex;gap:9px;align-items:center;padding:6px 0;border-bottom:1px solid var(--hairline);font-size:12.5px">
      ${attSrc(a)?`<img src="${attSrc(a)}" style="width:38px;height:38px;object-fit:cover;border-radius:8px;border:1px solid var(--hairline)">`:`<span style="font-size:19px">📄</span>`}
      <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(a.name)}</span>
      <button style="color:var(--ink-3);padding:4px" onclick="syncContactForm();CC.editC.attachments.splice(${i},1);renderContactForm()">✕</button></div>`).join('')}
    <label class="btn sm" style="margin-top:8px">📎 Attach files<input type="file" multiple accept="image/*,.pdf,.docx,.txt,.csv,.heic" style="display:none" onchange="contactAttach(this)"></label>
    <div style="font-size:10.5px;color:var(--ink-3);margin-top:6px">Images under ~400 KB are stored inside the dashboard and viewable anytime; larger files are catalogued by name. Attachments also appear in the File Center.</div>
  </div>

  <div class="modal-foot"><button class="btn" onclick="closeModal()">Cancel</button>
  <button class="btn primary" onclick="saveContact()">💾 Save contact</button></div>`);
}
function contactAttach(input){
  syncContactForm();
  const files = Array.from(input.files||[]);
  if(!files.length) return;
  let pending = files.length;
  files.forEach(f=>{
    const isImg = /^image\//.test(f.type);
    const att = { name:f.name, kind:isImg?'Screenshot':'Document', date:todayISO(), note:'', dataUrl:null, _new:true };
    if(isImg && f.size <= 400*1024){
      const r = new FileReader();
      r.onload = ()=>{ att.dataUrl = r.result; CC.editC.attachments.push(att); if(--pending===0) renderContactForm(); };
      r.onerror = ()=>{ CC.editC.attachments.push(att); if(--pending===0) renderContactForm(); };
      r.readAsDataURL(f);
    } else {
      CC.editC.attachments.push(att);
      if(--pending===0) renderContactForm();
    }
  });
}
function saveContact(){
  syncContactForm();
  const c = CC.editC;
  if(!c.name.trim()) { toast('⚠️ Name required','Give the contact a name before saving','warn'); return; }
  c.links = c.links.filter(l=>(l.url||'').trim());
  c.addresses = c.addresses.filter(a=>(a.text||'').trim());
  c.attachments.forEach(a=>{
    if(a._new){
      S.files.unshift({ id:uid('f'), emoji:a.dataUrl?'🖼️':'📄', name:a.name, kind:a.kind+' · '+c.name, date:a.date, size:'—', extract:'Attached to contact: '+c.name });
      delete a._new;
    }
  });
  if(c.id){
    const idx = S.contacts.findIndex(x=>x.id===c.id);
    if(idx>-1) S.contacts[idx] = c;
    addEvent('📇', `<b>Contact updated:</b> ${esc(c.name)}`, 'Note');
  } else {
    c.id = uid('c');
    S.contacts.push(c);
    addEvent('📇', `<b>Contact added:</b> ${esc(c.name)} (${esc(c.kind)})`, 'Note');
  }
  persist('Saved contact '+c.name); closeModal(); render(); toast('📇 Contact saved', c.name, 'good');
}

function vFiles(){
  $('#topbar').innerHTML = topbarHTML('📁 File Center', 'Statements, reports, letters — stored and summarized');
  $('#view').innerHTML = `
  <div class="dropzone section" id="dz" onclick="document.getElementById('fileinput').click()">
    <div class="dz-ico">📥</div>
    <b>Drop files here</b> or tap to browse<br>
    <span style="font-size:11px">PDF · PNG · JPEG · HEIC · DOCX · TXT · CSV</span>
    <input type="file" id="fileinput" multiple style="display:none" onchange="handleFiles(this.files)">
  </div>
  <div class="card" style="border-left:3px solid var(--accent);margin-bottom:16px">
    <div style="font-size:12.5px;color:var(--ink-2);line-height:1.6">
    ⭐ <b>Full document intelligence lives in your Claude chat.</b> Files dropped here are catalogued for reference. For automatic extraction — reading a credit report, pulling balances off a screenshot, parsing a dispute response — send the file to Claude in this conversation and say <i>“update Centauri Credit.”</i> Claude reads it and returns your dashboard with the data filled in.</div>
  </div>
  <div class="card"><h3>📚 Document Library (${S.files.length})</h3>
    ${S.files.map(f=>`<div class="file-row">
      <div class="file-ico">${f.emoji}</div>
      <div style="flex:1;min-width:0">
        <b>${esc(f.name)}</b>
        <div class="acct-sub">${esc(f.kind)} · ${fmtDate(f.date)} · ${esc(f.size)}</div>
        ${f.extract?`<div style="font-size:11.5px;color:var(--ink-2);margin-top:3px">🔎 ${esc(f.extract)}</div>`:''}
      </div>
      <button style="color:var(--ink-3);padding:6px" onclick="removeFile('${f.id}')">✕</button>
    </div>`).join('') || '<div class="empty"><div class="e-ico">📭</div>No documents yet</div>'}
  </div>`;
  const dz = $('#dz');
  ['dragenter','dragover'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.add('drag');}));
  ['dragleave','drop'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.remove('drag');}));
  dz.addEventListener('drop', e=>handleFiles(e.dataTransfer.files));
}
function handleFiles(list){
  Array.from(list).forEach(f=>{
    const kind = /pdf/i.test(f.name)?'Document':/png|jpe?g|heic/i.test(f.name)?'Screenshot':/csv/i.test(f.name)?'Data':/docx?/i.test(f.name)?'Letter':'File';
    const emoji = kind==='Screenshot'?'🖼️':kind==='Data'?'📊':kind==='Letter'?'📬':'📄';
    S.files.unshift({ id:uid('f'), emoji, name:f.name, kind, date:todayISO(), size:(f.size/1024>999? (f.size/1048576).toFixed(1)+' MB' : Math.round(f.size/1024)+' KB'), extract:'Send this file to Claude in chat for extraction → it will return updated dashboard data.' });
    addEvent('📄', `<b>Document added:</b> ${esc(f.name)}`, 'Document');
  });
  persist('Added files'); render();
  toast('📥 File saved', 'Catalogued in the library. For auto-extraction, share it in your Claude chat.','good');
}
function removeFile(id){ S.files = S.files.filter(f=>f.id!==id); persist('Removed file'); render(); }
</script>
<script>
/* ================================================================
   📬 DISPUTES & MAIL TRACKER — USPS status + FCRA deadline clocks
   ================================================================ */
const MAIL_STAGES = [
  { key:'prepared',   label:'Prepared',    emoji:'📝', tone:'neutral' },
  { key:'shipped',    label:'Shipped',     emoji:'📮', tone:'info' },
  { key:'in_transit', label:'In transit',  emoji:'🚚', tone:'info' },
  { key:'delivered',  label:'Delivered',   emoji:'📬', tone:'good' },
  { key:'responded',  label:'Response in', emoji:'📥', tone:'good' },
  { key:'resolved',   label:'Resolved',    emoji:'✅', tone:'good' }
];
function mailStage(k){ return MAIL_STAGES.find(s=>s.key===k) || MAIL_STAGES[0]; }
function daysBetween(aISO,bISO){ return Math.round((new Date(bISO+'T12:00:00') - new Date(aISO+'T12:00:00'))/86400000); }
function addDays(iso,n){ const d=new Date(iso+'T12:00:00'); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function responseDue(m){
  const base = m.deliveredDate || m.shipDate;
  return base ? addDays(base, m.responseWindowDays||30) : '';
}
function uspsUrl(tracking){ return 'https://tools.usps.com/go/TrackConfirmAction?tLabels=' + encodeURIComponent((tracking||'').replace(/\s/g,'')); }

/* full envelope addressee block: company → department/attn → street/PO → city,state zip */
function mailBlockLines(m){
  const lines = [];
  if(m.to) lines.push(m.to);
  if(m.dept) lines.push(/^attn/i.test(m.dept)? m.dept : ('Attn: ' + m.dept));
  if(m.toAddress) lines.push(m.toAddress);
  return lines;
}
function mailBlockHTML(m){
  const lines = mailBlockLines(m);
  if(!lines.length) return '<span style="color:var(--ink-3)">No address on file</span>';
  return lines.map((l,i)=>`<div style="${i===0?'font-weight:650;color:var(--ink-1)':''}">${esc(l)}</div>`).join('');
}
function copyMailBlock(id){
  const m = S.mail.find(x=>x.id===id); if(!m) return;
  const txt = mailBlockLines(m).join('\n');
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>toast('📋 Address copied','Full mailing block ready to paste','good')).catch(()=>prompt('Copy the mailing address:', txt));
  } else prompt('Copy the mailing address:', txt);
}

function vMail(){
  const open = S.mail.filter(m=>m.status!=='resolved');
  $('#topbar').innerHTML = topbarHTML('📬 Disputes & Mail', `${open.length} active · USPS tracking + FCRA deadline clocks`,
    `<button class="btn primary" onclick="openMailForm()">➕ New dispute / letter</button>`);
  $('#view').innerHTML = `
  ${S.mail.length? `<div class="grid section" style="grid-template-columns:1fr;gap:16px">${S.mail.map(mailCardHTML).join('')}</div>`
    : '<div class="card"><div class="empty"><div class="e-ico">📭</div>No disputes or letters tracked yet</div></div>'}
  <div class="est-note" style="max-width:720px">USPS delivery isn’t auto-fetched inside the app — tap <b>Track on USPS</b> for the live official page, or ask Centauri AI in your Claude chat to “check my dispute tracking” and it will look it up and update the status here. Deadline clocks assume 30 days from delivery per FCRA §611.</div>`;
}

function mailCardHTML(m){
  const st = mailStage(m.status);
  const due = responseDue(m);
  const today = todayISO();
  const shipIn = m.shipDate && m.status==='prepared' ? daysBetween(today, m.shipDate) : null;
  let clock = '';
  if(due && ['delivered','responded'].includes(m.status)){
    const left = daysBetween(today, due);
    clock = left>=0
      ? `<span class="badge ${left<=7?'warn':'info'}">⏳ ${left} day${left===1?'':'s'} left for Equifax to respond (by ${fmtDate(due)})</span>`
      : `<span class="badge crit">⚠️ Response overdue by ${Math.abs(left)} days — escalate to CFPB</span>`;
  } else if(m.status==='resolved'){
    clock = `<span class="badge good">✅ Resolved</span>`;
  } else if(due){
    clock = `<span class="badge neutral">🗓 Est. response deadline ${fmtDate(due)} (30 days from ${m.deliveredDate?'delivery':'ship'})</span>`;
  }

  // progress stepper
  const idx = MAIL_STAGES.findIndex(s=>s.key===m.status);
  const stepper = MAIL_STAGES.slice(0,5).map((s,i)=>`
    <div style="flex:1;text-align:center;min-width:0">
      <div style="width:26px;height:26px;border-radius:50%;margin:0 auto;display:grid;place-items:center;font-size:12px;
        background:${i<=idx?'linear-gradient(135deg,#2a63d6,#7b3ff0)':'var(--glass-raise)'};color:${i<=idx?'#fff':'var(--ink-3)'}">${i<idx?'✓':s.emoji}</div>
      <div style="font-size:9.5px;margin-top:4px;color:${i<=idx?'var(--ink-1)':'var(--ink-3)'}">${s.label}</div>
    </div>
    ${i<4?`<div style="flex:1;height:2px;margin-top:12px;background:${i<idx?'var(--accent)':'var(--hairline-2)'}"></div>`:''}`).join('');

  const atts = m.attachments||[];
  return `<div class="card">
    <div style="display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap">
      <div class="acct-logo" style="font-size:18px">${st.emoji}</div>
      <div style="flex:1;min-width:180px">
        <b style="font-size:14.5px">${esc(m.title)}</b>
        <div class="acct-sub">${esc(m.kind)} · to ${esc(m.to)}</div>
      </div>
      <span class="badge ${st.tone}" style="font-size:11px">${st.emoji} ${st.label}</span>
    </div>

    <div style="display:flex;align-items:flex-start;margin:16px 2px 6px">${stepper}</div>

    <div class="cb" style="font-size:12.5px;color:var(--ink-2);display:grid;gap:6px;margin-top:12px">
      <div class="crow" style="align-items:flex-start"><span class="ci">✉️</span>
        <div style="line-height:1.5">
          <div style="font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Mail to</div>
          ${mailBlockHTML(m)}
          <button class="btn sm" style="margin-top:7px;padding:4px 10px;font-size:11px" onclick="copyMailBlock('${m.id}')">📋 Copy address</button>
        </div></div>
      <div class="crow" style="margin-top:2px"><span class="ci">📦</span>${esc(m.service)}</div>
      <div class="crow"><span class="ci">📅</span>${m.status==='prepared'?'Ships':'Shipped'} ${fmtDate(m.shipDate)}${shipIn!==null&&shipIn>0?` <span style="color:var(--ink-3)">· in ${shipIn} day${shipIn===1?'':'s'}</span>`:''}${m.deliveredDate?` · <b style="color:var(--good-text)">Delivered ${fmtDate(m.deliveredDate)}</b>`:''}</div>
      <div class="crow"><span class="ci">🔎</span>${m.tracking?`<span class="num" style="user-select:all">${esc(m.tracking)}</span>`:'<span style="color:var(--ink-3)">Add tracking # once you have the certified receipt</span>'}</div>
      ${m.lastChecked?`<div class="crow"><span class="ci">🕐</span>Status last checked ${fmtDate(m.lastChecked)}</div>`:''}
      ${m.notes?`<div class="crow" style="align-items:flex-start"><span class="ci">📝</span><span style="line-height:1.5">${esc(m.notes)}</span></div>`:''}
    </div>

    <div style="margin-top:12px">${clock}</div>

    ${atts.length?`<div style="margin-top:13px"><div style="font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px">📎 Enclosures / files</div>
      <div style="display:flex;gap:7px;flex-wrap:wrap">${atts.map((a,i)=>`<button class="chip" style="font-size:10.5px" onclick="openMailAtt('${m.id}',${i})">${attSrc(a)?'🖼️':'📄'} ${esc(a.name.length>30?a.name.slice(0,28)+'…':a.name)}</button>`).join('')}</div></div>`:''}

    <div style="display:flex;gap:8px;margin-top:15px;flex-wrap:wrap">
      ${m.tracking?`<a class="btn sm primary" href="${uspsUrl(m.tracking)}" target="_blank" rel="noopener">🔎 Track on USPS ↗</a>`:''}
      ${m.status==='prepared'?`<button class="btn sm" onclick="markShipped('${m.id}')">📮 Mark shipped</button>`:''}
      ${['shipped','in_transit'].includes(m.status)?`<button class="btn sm" onclick="markDelivered('${m.id}')">📬 Mark delivered</button>`:''}
      ${m.status==='delivered'?`<button class="btn sm" onclick="advanceMail('${m.id}','responded')">📥 Got their response</button>`:''}
      ${['delivered','responded'].includes(m.status)?`<button class="btn sm" onclick="advanceMail('${m.id}','resolved')">✅ Resolved</button>`:''}
      <button class="btn sm" onclick="openMailForm('${m.id}')">✏️ Edit</button>
      <button class="btn sm ghost" onclick="deleteMail('${m.id}')" style="color:var(--ink-3)">🗑</button>
    </div>
  </div>`;
}

function openMailAtt(mid, idx){
  const m = S.mail.find(x=>x.id===mid); if(!m) return;
  const a = (m.attachments||[])[idx]; if(!a) return;
  const src = attSrc(a);
  openModal(`<h2>📎 ${esc(a.name)} <span class="x" onclick="closeModal()">✕</span></h2>
    <div style="font-size:12px;color:var(--ink-3);margin-bottom:11px">${esc(a.kind||'File')} · ${fmtDate(a.date)}${a.note?` · ${esc(a.note)}`:''}</div>
    ${src? `<img src="${src}" style="max-width:100%;border-radius:12px;border:1px solid var(--hairline)">`
      : `<div class="empty"><div class="e-ico">📄</div>Reference stored in the File Center. The downloadable original is in your Claude chat.</div>`}
    <div class="modal-foot"><button class="btn primary" onclick="closeModal()">Done</button></div>`);
}

function markShipped(id){
  const m = S.mail.find(x=>x.id===id); if(!m) return;
  const tr = prompt('Enter the USPS Certified Mail tracking number (from your receipt).\nLeave blank to add later:', m.tracking||'');
  if(tr!==null && tr.trim()) m.tracking = tr.trim();
  m.status = 'shipped';
  if(!m.shipDate || new Date(m.shipDate+'T12:00:00')>new Date()) m.shipDate = todayISO();
  m.lastChecked = todayISO();
  addEvent('📮', `<b>Dispute shipped:</b> ${esc(m.title)}${m.tracking?` (USPS ${esc(m.tracking)})`:''}.`, 'Dispute');
  persist('Mail shipped: '+m.title); render();
  toast('📮 Marked shipped', m.tracking?'Tracking saved — the 30-day clock starts on delivery':'Add the tracking # when you have it','good');
}
function markDelivered(id){
  const m = S.mail.find(x=>x.id===id); if(!m) return;
  const d = prompt('Delivery date (YYYY-MM-DD):', todayISO());
  if(d===null) return;
  m.deliveredDate = d.trim()||todayISO();
  m.status = 'delivered'; m.lastChecked = todayISO();
  const due = responseDue(m);
  addEvent('📬', `<b>Dispute delivered</b> to ${esc(m.to)} on ${fmtDate(m.deliveredDate)}. Equifax has until <b>${fmtDate(due)}</b> to respond.`, 'Dispute');
  persist('Mail delivered: '+m.title); render();
  celebrate(); toast('📬 Delivered!', `30-day FCRA clock ends ${fmtDate(due)}`,'good');
}
function advanceMail(id, status){
  const m = S.mail.find(x=>x.id===id); if(!m) return;
  m.status = status; m.lastChecked = todayISO();
  if(status==='responded') addEvent('📥', `<b>Response received</b> on the ${esc(m.title)}.`, 'Dispute');
  if(status==='resolved'){ addEvent('✅', `<b>Dispute resolved:</b> ${esc(m.title)}.`, 'Dispute'); celebrate(); }
  persist('Mail '+status+': '+m.title); render();
  toast(status==='resolved'?'✅ Resolved':'📥 Updated', m.title, 'good');
}
function deleteMail(id){
  const m = S.mail.find(x=>x.id===id);
  if(!confirm('Remove "'+m.title+'" from tracking?')) return;
  S.mail = S.mail.filter(x=>x.id!==id); persist('Removed mail item'); render();
}

function openMailForm(id){
  const m = id? S.mail.find(x=>x.id===id) : { id:'', title:'', kind:'Dispute', to:'', toAddress:'', service:'USPS Certified Mail + Return Receipt', tracking:'', shipDate:todayISO(), deliveredDate:'', status:'prepared', responseWindowDays:30, notes:'', attachments:[] };
  openModal(`<h2>${id?'✏️ Edit':'➕ New'} Dispute / Letter <span class="x" onclick="closeModal()">✕</span></h2>
  <div class="form-grid">
    <div class="fld full"><label>Title</label><input id="mf-title" value="${esc(m.title)}" placeholder="Equifax — duplicate tradeline dispute"></div>
    <div class="fld"><label>Type</label><select id="mf-kind">${['Dispute','Pay-for-delete','Goodwill letter','Debt validation','Fraud-alert removal','Other'].map(k=>`<option ${m.kind===k?'selected':''}>${k}</option>`).join('')}</select></div>
    <div class="fld"><label>Bureau / party</label><input id="mf-bureau" value="${esc(m.bureau||'')}" placeholder="Equifax"></div>
    <div class="fld full"><label>Company / recipient name</label><input id="mf-to" value="${esc(m.to)}" placeholder="Equifax Information Services LLC"></div>
    <div class="fld full"><label>Department / Attn (optional)</label><input id="mf-dept" value="${esc(m.dept||'')}" placeholder="Consumer Dispute Department"></div>
    <div class="fld full"><label>Street / P.O. Box + City, State ZIP</label><input id="mf-addr" value="${esc(m.toAddress)}" placeholder="P.O. Box 105069, Atlanta, GA 30348-5069"></div>
    <div class="fld"><label>Mail service</label><input id="mf-service" value="${esc(m.service)}"></div>
    <div class="fld"><label>Tracking #</label><input id="mf-track" value="${esc(m.tracking||'')}" placeholder="9407 1000 0000 0000 0000 00"></div>
    <div class="fld"><label>Ship date</label><input id="mf-ship" type="date" value="${esc(m.shipDate||'')}"></div>
    <div class="fld"><label>Delivered date</label><input id="mf-deliv" type="date" value="${esc(m.deliveredDate||'')}"></div>
    <div class="fld"><label>Status</label><select id="mf-status">${MAIL_STAGES.map(s=>`<option value="${s.key}" ${m.status===s.key?'selected':''}>${s.label}</option>`).join('')}</select></div>
    <div class="fld"><label>Response window (days)</label><input id="mf-win" type="number" value="${m.responseWindowDays||30}"></div>
    <div class="fld full"><label>Notes</label><textarea id="mf-notes" rows="2">${esc(m.notes||'')}</textarea></div>
  </div>
  <div class="modal-foot"><button class="btn" onclick="closeModal()">Cancel</button>
  <button class="btn primary" onclick="saveMail('${id||''}')">💾 Save</button></div>`);
}
function saveMail(id){
  const v = k => { const el=$('#mf-'+k); return el?el.value:''; };
  const data = { title:v('title')||'Untitled', kind:v('kind'), bureau:v('bureau'), to:v('to'), dept:v('dept'), toAddress:v('addr'),
    service:v('service'), tracking:v('track').trim(), shipDate:v('ship'), deliveredDate:v('deliv'),
    status:v('status'), responseWindowDays:+v('win')||30, notes:v('notes') };
  if(!data.title.trim()){ toast('⚠️ Title required','',''); return; }
  if(id){ const m=S.mail.find(x=>x.id===id); Object.assign(m, data); }
  else { S.mail.unshift({ id:uid('m'), lastChecked:'', attachments:[], ...data }); addEvent('📬',`<b>Dispute tracked:</b> ${esc(data.title)}`,'Dispute'); }
  persist('Saved mail '+data.title); closeModal(); render(); toast('💾 Saved', data.title,'good');
}
