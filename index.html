<script>
/* ================================================================
   SCORE SIMULATOR
   ================================================================ */
function simEstimate(opts){
  // Rule-of-thumb FICO deltas. Clearly labeled estimates in UI.
  const r = revolvers();
  const curBal = r.reduce((s,a)=>s+a.balance,0), curLim = r.reduce((s,a)=>s+a.limit,0);
  let bal = Math.max(0, curBal - (opts.pay||0));
  let lim = curLim + (opts.cli||0);
  if(opts.newCard) lim += 2000;
  const curU = curLim? curBal/curLim*100 : 0;
  const newU = lim? bal/lim*100 : 0;
  let delta = 0;
  const uScore = u => u<1?18 : u<10?22 : u<30?12 : u<50?2 : u<75?-8 : -18;
  delta += uScore(newU) - uScore(curU);
  if(opts.removeCollection && hasCollections()) delta += 27;
  if(opts.newCard) delta -= 6;           // inquiry + new account + AAoA hit
  if(opts.newInquiry) delta -= 4;
  if(opts.lateFalls) delta += 9;
  return { delta: Math.round(delta), newU, curU };
}
function vSimulator(){
  $('#topbar').innerHTML = topbarHTML('🧮 Score Simulator', 'Test moves before you make them — instant FICO estimates');
  const maxPay = revolvers().reduce((s,a)=>s+a.balance,0);
  $('#view').innerHTML = `
  <div class="grid section" style="grid-template-columns:5fr 4fr" id="simgrid">
    <div class="card">
      <h3>🎛 Scenario Controls</h3>
      <div class="sim-controls">
        <div class="sim-row">
          <label>💰 Pay down card balances <b id="sv-pay">$0</b></label>
          <input type="range" id="sim-pay" min="0" max="${maxPay}" step="25" value="0" oninput="runSim()">
        </div>
        <div class="sim-row">
          <label>📈 Credit limit increase <b id="sv-cli">$0</b></label>
          <input type="range" id="sim-cli" min="0" max="10000" step="250" value="0" oninput="runSim()">
        </div>
        <label class="sim-toggle"><input type="checkbox" id="sim-coll" onchange="runSim()"> 🗑 A derogatory deleted (AT&T dispute wins / duplicate removed)</label>
        <label class="sim-toggle"><input type="checkbox" id="sim-card" onchange="runSim()"> 💳 Open a new card (+$2,000 limit, −1 inquiry)</label>
        <label class="sim-toggle"><input type="checkbox" id="sim-inq" onchange="runSim()"> 🔍 One new hard inquiry (rate shopping)</label>
        <label class="sim-toggle"><input type="checkbox" id="sim-late" onchange="runSim()"> 🕐 Late payment ages past 24 months</label>
      </div>
      <div class="chips" style="margin-top:14px">
        <button class="chip" onclick="presetSim(1000,0,0,0,0,0)">“What if I pay $1,000?”</button>
        <button class="chip" onclick="presetSim(${Math.max(0,Math.round(maxPay-0.08*revolvers().reduce((s,a)=>s+a.limit,0)))},0,0,0,0,0)">“Utilization → 8%”</button>
        <button class="chip" onclick="presetSim(0,0,1,0,0,0)">“AT&T gets deleted”</button>
        <button class="chip" onclick="presetSim(0,2000,0,0,0,0)">“Get a $2k CLI”</button>
        <button class="chip" onclick="presetSim(0,0,0,1,0,0)">“Open a new card”</button>
      </div>
    </div>
    <div class="card">
      <h3>🔮 Estimated Outcome</h3>
      <div class="sim-result">
        <div style="font-size:11px;color:var(--ink-3);letter-spacing:.05em;text-transform:uppercase">Projected 3-bureau average</div>
        <div class="snum num" id="sim-score">${avgScore()}</div>
        <div class="sd" id="sim-delta" style="color:var(--ink-3)">no changes yet</div>
        <div style="margin:16px 0 6px;font-size:11.5px;color:var(--ink-2);display:flex;justify-content:space-between"><span>Utilization</span><b id="sim-util" class="num">${fmtPct(totalUtil())}</b></div>
        <div id="sim-utilbar">${utilBar(totalUtil())}</div>
        <div id="sim-bureaus" style="margin-top:16px;display:grid;gap:8px"></div>
      </div>
      <div class="est-note">⚠️ These are directional <b>estimates</b> based on published FICO factor weights — not guarantees. Actual changes depend on your full file and each bureau’s data.</div>
    </div>
  </div>`;
  if(window.innerWidth<=1060) $('#simgrid').style.gridTemplateColumns='1fr';
  runSim();
}
function presetSim(pay,cli,coll,card,inq,late){
  $('#sim-pay').value = Math.min(pay, +$('#sim-pay').max);
  $('#sim-cli').value = cli;
  $('#sim-coll').checked = !!coll; $('#sim-card').checked = !!card;
  $('#sim-inq').checked = !!inq; $('#sim-late').checked = !!late;
  runSim();
}
function runSim(){
  const opts = { pay:+$('#sim-pay').value, cli:+$('#sim-cli').value,
    removeCollection:$('#sim-coll').checked, newCard:$('#sim-card').checked,
    newInquiry:$('#sim-inq').checked, lateFalls:$('#sim-late').checked };
  $('#sv-pay').textContent = fmt$(opts.pay);
  $('#sv-cli').textContent = '+'+fmt$(opts.cli);
  const est = simEstimate(opts);
  const proj = clamp(avgScore()+est.delta, 300, 850);
  $('#sim-score').textContent = proj;
  const d = $('#sim-delta');
  d.textContent = est.delta===0? 'no change' : (est.delta>0? `▲ +${est.delta} points (est.)` : `▼ ${est.delta} points (est.)`);
  d.style.color = est.delta>0? 'var(--good-text)' : est.delta<0? 'var(--crit-text)' : 'var(--ink-3)';
  $('#sim-util').textContent = fmtPct(est.newU);
  $('#sim-utilbar').innerHTML = utilBar(est.newU);
  $('#sim-bureaus').innerHTML = BUREAU_CARDS.map(k=>{
    const cvar = k==='experian'?'--exp':k==='equifax'?'--equ':'--tu';
    const p = clamp(S.scores[k].current+est.delta,300,850);
    return `<div style="display:flex;align-items:center;gap:9px;font-size:12px">
      <i style="width:8px;height:8px;border-radius:50%;background:var(${cvar});flex-shrink:0"></i>
      ${BMETA[k].label}<span style="margin-left:auto" class="num">${S.scores[k].current} → <b>${p}</b></span></div>`;
  }).join('');
}

/* ================================================================
   ⭐ CENTAURI AI — rule-based command engine
   ================================================================ */
function vAI(){
  $('#topbar').innerHTML = topbarHTML('⭐ Centauri AI', 'Your FICO expert. Tell it what happened — it updates everything.');
  $('#view').innerHTML = `
  <div class="card chat-wrap">
    <div class="chat-scroll" id="chatscroll">
      ${S.chat.map(m=>`<div class="msg ${m.who}"><span class="mtag">${m.who==='ai'?'⭐ Centauri AI':'You'}</span>${esc(m.text)}</div>`).join('')}
    </div>
    <div class="chips">
      <button class="chip" onclick="quickAsk('What should I do next?')">What should I do next?</button>
      <button class="chip" onclick="quickAsk('Explain the Equifax duplicate')">The Equifax duplicate</button>
      <button class="chip" onclick="quickAsk('How do I remove a collection?')">Remove a collection</button>
      <button class="chip" onclick="quickAsk('My Equifax score is now 560')">Update my score</button>
      <button class="chip" onclick="quickAsk('Explain utilization')">Explain utilization</button>
    </div>
    <div id="aipending" style="padding:2px 2px 0"></div>
    <div class="chat-input">
      <label class="btn" style="flex-shrink:0;cursor:pointer;padding:9px 13px" title="Attach a file (screenshot, report, letter…)">📎<input type="file" id="aifile" accept="image/*,.pdf,.docx,.txt,.csv,.heic" style="display:none" onchange="aiFileSelected(this)"></label>
      <input id="aiinput" placeholder="Attach a file + say what it is, or: “I paid Capital One $200” · “Equifax is now 560” · “shipped the dispute”" onkeydown="if(event.key==='Enter')sendAI()">
      <button class="btn primary" onclick="sendAI()">Send ⭐</button>
    </div>
  </div>`;
  renderAIPending();
  scrollChat();
}
function scrollChat(){ const el = $('#chatscroll'); if(el) el.scrollTop = el.scrollHeight; }
function quickAsk(t){ $('#aiinput').value = t; sendAI(); }
function sendAI(){
  const inp = $('#aiinput'); const text = inp.value.trim();
  const pf = window._aiPendingFile;
  if(!text && !pf) return;
  inp.value='';
  S.chat.push({who:'me', text: (pf?`📎 ${pf.name}\n`:'') + text});
  let reply;
  if(pf){ reply = intakeFile(pf, text); window._aiPendingFile = null; }
  else { reply = centauriBrain(text); }
  S.chat.push({who:'ai', text:reply});
  persist('AI conversation');
  vAI();
}

/* ---- file intake: attach in chat, tell it what it is → it files & connects ---- */
function aiFileSelected(input){
  const f = input.files && input.files[0];
  if(!f) return;
  const isImg = /^image\//.test(f.type);
  const kind = isImg?'Screenshot' : /pdf/i.test(f.name)?'Document' : /csv|xlsx?/i.test(f.name)?'Data' : /docx?/i.test(f.name)?'Letter' : 'File';
  const done = (dataUrl)=>{ window._aiPendingFile = { name:f.name, kind, dataUrl:dataUrl||null, isImage:isImg }; renderAIPending(); };
  if(isImg && f.size <= 700*1024){ const r=new FileReader(); r.onload=()=>done(r.result); r.onerror=()=>done(null); r.readAsDataURL(f); }
  else done(null);
  input.value = '';
}
function renderAIPending(){
  const el = document.getElementById('aipending'); if(!el) return;
  const f = window._aiPendingFile;
  el.innerHTML = f
    ? `<span class="chip" style="background:var(--glass-raise)">📎 ${esc(f.name)} <b style="cursor:pointer;margin-left:4px" onclick="window._aiPendingFile=null;renderAIPending()">✕</b></span> <span style="font-size:11px;color:var(--ink-3)">— tell me what it is / what you did, and I’ll file it and update your profile</span>`
    : '';
}
/* score-match the dispute the message is about (entity-specific, not generic) */
function matchDispute(text){
  const t = (text||'').toLowerCase();
  const STOP = new Set(['equifax','experian','transunion','dispute','collection','tradeline','letter','services','information','mobility']);
  let best=null, bestScore=0;
  (S.mail||[]).forEach(m=>{
    let score=0;
    if(/at\s*&?\s*t|\batt\b/.test(t) && /at\s*&?\s*t/i.test(m.title)) score+=3;
    if(/capital|cap\s*one|quicksilver|platinum|duplicate/.test(t) && /capital|duplicate/i.test(m.title)) score+=3;
    m.title.toLowerCase().split(/[^a-z0-9&]+/).forEach(w=>{ if(w.length>3 && !STOP.has(w) && t.includes(w)) score+=1; });
    if(score>bestScore){ bestScore=score; best=m; }
  });
  return bestScore>0 ? best : null;
}
function intakeFile(pf, text){
  const t = (text||'').toLowerCase();
  const att = { name:pf.name, kind:pf.kind, date:todayISO(), note: text||'Uploaded via Centauri AI', dataUrl: pf.dataUrl||null };

  /* 1) always save to File Center (viewable if it's an image) */
  S.files.unshift({ id:uid('f'), emoji: pf.isImage?'🖼️':pf.kind==='Document'?'📄':pf.kind==='Letter'?'📬':pf.kind==='Data'?'📊':'📄',
    name:pf.name, kind: pf.kind + (text?(' · '+text.slice(0,44)):''), date:todayISO(), size:'—',
    dataUrl: pf.dataUrl||null, extract: text||'Uploaded via Centauri AI' });

  /* 2) connect it to the right thing, based on what you said */
  const linked = [], did = [];
  const mail = matchDispute(t);
  const contact = (S.contacts||[]).find(c=> c.name.toLowerCase().split(/\s+/).some(w=>w.length>3 && t.includes(w)));
  const acc = findAccount(t);

  if(mail){
    mail.attachments = mail.attachments||[]; mail.attachments.push(att); mail.lastChecked = todayISO();
    linked.push(`the ${mail.title.replace(/^Equifax — /,'')}`);
    /* act on dispute status straight from your words */
    const tnum = text && text.match(/\b(9[24]\d{2}[\s\d]{12,26}\d)\b/);
    if(tnum){ mail.tracking = tnum[1].replace(/\s+/g,' ').trim(); did.push(`saved tracking ${mail.tracking}`); }
    if(/deliver/.test(t)){ mail.status='delivered'; mail.deliveredDate=todayISO(); did.push(`marked it delivered — Equifax now has until ${fmtDate(responseDue(mail))} to respond`); }
    else if(/response|result|answer|reply|hear.?back/.test(t) && mail.status!=='prepared'){ mail.status='responded'; did.push('marked their response received'); }
    else if(/ship|mail|sent|dropped|drop.?off|certified|receipt/.test(t) && mail.status==='prepared'){ mail.status='shipped'; mail.shipDate=mail.shipDate||todayISO(); did.push('moved it to Shipped'); }
  } else if(contact){
    contact.attachments = contact.attachments||[]; contact.attachments.push(att); linked.push(`your ${contact.name} contact`);
  }
  if(acc){ acc.notes = (acc.notes?acc.notes+' ':'') + `📎 ${pf.name}${text?': '+text:''} (${fmtDate(todayISO())}).`; linked.push(acc.name); }

  /* 3) timeline */
  addEvent('📄', `<b>Uploaded:</b> ${esc(pf.name)}${text?` — ${esc(text)}`:''}${linked.length?` <span style="color:var(--ink-3)">(linked to ${esc(linked.join(' & '))})</span>`:''}`, 'Document');

  /* 4) non-dispute intents (payment / score / reminder) → main brain */
  let brain='';
  if(!mail && text && /paid|payment|\bscore\b|now\s+\d{3}|is\s+\d{3}|remind|add.*task/.test(t)){ brain = centauriBrain(text); }

  persist('AI file intake');

  /* 5) confirm */
  let head = `📎 Filed “${pf.name}” in your File Center${pf.isImage?' — tap it there to view':''}.`;
  if(linked.length) head += `\n🔗 Connected it to ${linked.join(' & ')}.`;
  if(did.length) head += `\n✅ ${did.join('; ')}.`;
  head += `\n🕐 Logged to your timeline.`;
  if(brain) return head + `\n\n— — —\n` + brain;
  if(!linked.length) return head + `\n\nI couldn’t tell what this connects to yet — tell me and I’ll link it, e.g. “this is the AT&T dispute receipt, tracking 9407…”, “Discover statement”, or “new Experian score, it’s 605”.`;
  return head + `\n\nAnything else? I can log a payment, update a score, mark delivered, or add a task — just tell me.`;
}
function findAccount(text){
  const t = text.toLowerCase();
  return S.accounts.find(a =>
    a.name.toLowerCase().split(/\s+/).some(w=>w.length>3 && t.includes(w)) ||
    (a.nickname && a.nickname.toLowerCase().split(/\s+/).some(w=>w.length>3 && t.includes(w))));
}
function centauriBrain(text){
  const t = text.toLowerCase();
  const money = text.match(/\$?\s?([\d,]+(?:\.\d{1,2})?)/);
  const amt = money? parseFloat(money[1].replace(/,/g,'')) : null;

  /* -- payment logged: "I paid X (amount)" -- */
  if(/\b(paid|payment|pay(ed)?)\b/.test(t) && !/should|what if|simulate|how/.test(t)){
    const a = findAccount(t);
    if(a){
      const amount = amt!=null && amt<=a.balance+5000? amt : a.balance;
      const gain = applyPayment(a, amount, false);
      return `💰 Logged! ${fmt$(amount)} payment to ${a.name}.\n\n→ Balance: ${fmt$(a.balance)}${a.limit?`\n→ Card utilization: ${fmtPct(acctUtil(a))}`:''}\n→ Overall utilization: ${fmtPct(totalUtil())}\n→ Estimated score impact: ${gain} once the new balance reports\n→ Timeline updated · matching task checked off${a.balance===0?'\n\n🎉 PAID OFF — that’s a milestone. Confetti earned.':''}\n\nTip: the balance that matters is the one on your statement date. Pay 3–4 days before it cuts.`;
    }
    return `I couldn’t match that to an account. Your open accounts: ${S.accounts.map(a=>a.name).join(' · ')}. Try “I paid Discover $300”.`;
  }

  /* -- score update: "my experian is 672" -- */
  if(/(score|experian|equifax|transunion).*\b[3-8]\d{2}\b/.test(t) || /\b[3-8]\d{2}\b.*(experian|equifax|transunion|score)/.test(t)){
    const num = text.match(/\b([3-8]\d{2})\b/);
    if(num){
      const v = +num[1];
      const key = t.includes('experian')?'experian' : t.includes('equifax')?'equifax' : t.includes('transunion')?'transunion' : null;
      if(key){
        const old = S.scores[key].current;
        S.scores[key].current = v;
        S.scores[key].history.push(v); S.scores[key].history = S.scores[key].history.slice(-12);
        S.lastUpdated = todayISO();
        const d = v-old;
        addEvent(d>=0?'📈':'📉', `<b>${BMETA[key].label} ${d>=0?'+'+d:d} → ${v}.</b> Reported via Centauri AI.`, 'Score change');
        persist(`${BMETA[key].label} score → ${v}`);
        if(d>0 && v>=S.profile.goalScore) { celebrate(); }
        else if(d>=5) celebrate();
        return `${d>=0?'📈':'📉'} ${BMETA[key].label} updated: ${old} → ${v} (${d>=0?'+':''}${d}).\n\n→ Score card & trend graph refreshed\n→ Goal progress recalculated (avg now ${avgScore()})\n→ Timeline entry added${d>=5?'\n\n🎉 That’s a real jump — whatever you did last month, keep doing it.':d<0?'\n\nLikely culprits for drops: a higher reported balance, a new inquiry, or a changed account status. Want me to walk through it? Ask “why did my score drop?”':''}`;
      }
      return `Got the number (${v}) — which bureau? Try “Equifax is now ${v}”.`;
    }
  }

  /* -- dispute shipped / tracking number -- */
  if(/ship|mail|sent|dropped|drop.*off/.test(t) && /dispute|equifax|letter|certified/.test(t) || /\b94\d{2}[\s\d]{16,}/.test(text)){
    const m = S.mail && S.mail[0];
    if(m){
      const tnum = text.match(/\b(9[24]\d{2}[\s\d]{14,26}\d)\b/);
      if(tnum) m.tracking = tnum[1].replace(/\s+/g,' ').trim();
      m.status = 'shipped'; m.shipDate = m.shipDate || todayISO(); m.lastChecked = todayISO();
      addEvent('📮', `<b>Dispute shipped:</b> ${esc(m.title)}${m.tracking?` (USPS ${esc(m.tracking)})`:''}.`, 'Dispute');
      persist('Dispute shipped via AI');
      return `📮 Logged — “${m.title}” marked as shipped${m.tracking?` with tracking ${m.tracking}`:''}.\n\n→ Status moved to Shipped in the Disputes tab\n→ The 30-day FCRA clock starts the day Equifax receives it — I’ll compute the deadline the moment you mark it delivered\n${m.tracking?'→ Tap “Track on USPS” on the dispute card for live delivery status':'→ Add your Certified Mail tracking number (from the green receipt) and I’ll wire up the USPS link'}\n\nTip: in your Claude chat you can say “check my dispute tracking” and I’ll look up the USPS status and update the app for you.`;
    }
  }

  /* -- reminder / task -- */
  if(/remind|task|to-?do|don'?t let me forget/.test(t)){
    const title = text.replace(/^(please\s+)?(remind me to|add (a )?task( to)?|create (a )?task( to)?)\s*/i,'').replace(/\s+(on|by|this|next)\s+\w+$/i,'');
    S.tasks.unshift({ id:uid('t'), emoji:'🔔', title: title.charAt(0).toUpperCase()+title.slice(1), prio:'med', due:'', impact:'', done:false, note:'Added via Centauri AI' });
    addEvent('🔔', `<b>Reminder set:</b> ${esc(title)}`, 'Task');
    persist('AI reminder: '+title);
    return `🔔 Done — added “${title}” to your Task Center (medium priority).\n\nOpen it to set a due date, or tell me: “make it high priority”.`;
  }

  /* -- what next / advice -- */
  if(/what.*(next|should i do|do next)|priorit|advice|plan/.test(t)){
    const s = suggestions().slice(0,3);
    return `🧭 Your highest-leverage moves right now, ranked:\n\n` + s.map((x,i)=>`${i+1}. ${x.rank} ${x.title}\n   ${x.impact} · ${x.diff} · ${x.time}`).join('\n\n') + `\n\nThe theme: utilization and the collection are ~80% of your upside. Everything else is maintenance. Want any of these as tasks? Just say “add #1 as a task”.`;
  }
  if(/add #?(\d).*task/.test(t)){
    const n = +t.match(/#?(\d)/)[1];
    const x = suggestions()[n-1];
    if(x){ S.tasks.unshift({ id:uid('t'), emoji:'⭐', title:x.title, prio:'high', due:'', impact:x.impact, done:false, note:'From AI plan' });
      persist('AI task'); return `✅ Added “${x.title}” as a high-priority task. Estimated impact: ${x.impact}.`; }
  }

  /* -- the Equifax duplicate -- */
  if(/duplicate|equifax.*(error|twice|double|dispute)|why.*equifax/.test(t)){
    return `🔵 Why Equifax (540) is 50+ points behind your other bureaus:\n\n1. 💳 DUPLICATE TRADELINE — your Cap One Platinum Secured appears TWICE on Equifax ($497 and $505, both ~100% utilization). One card is being counted as two maxed cards.\n2. 📉 AT&T COLLECTION — Equifax shows it UNPAID ($1,312, reassigned 2/27/26) while Experian shows the same debt PAID/terminated. Bureaus contradicting each other is a classic FCRA §611 dispute.\n\nThe play: file both disputes at equifax.com/personal/disputes (or certified mail). They have 30 days to verify or delete. Attach your Experian report page showing AT&T as paid.\n\nEstimated combined impact: +25–55 points on Equifax alone. This is your single highest-leverage move.`;
  }

  /* -- why did score drop -- */
  if(/why.*(drop|fall|down|lower)/.test(t)){
    return `🔍 Most likely causes for your file, in order:\n\n1. 📊 A statement reporting a higher balance (your Cap One cards swing hardest — small limits move percentages fast)\n2. ❌ Snap-On or Navient re-reporting the charge-off (refreshes the “recent derog” signal monthly)\n3. 📅 Bureau timing — the three don’t update in sync; a “drop” is often one bureau lagging\n4. 🔍 A new inquiry\n\nUpload a fresh score screenshot to Claude in your chat and it can pinpoint exactly which factor moved.`;
  }

  /* -- collections / charge-offs -- */
  if(/collection|at ?& ?t|att|snap.?on|navient|pay for delete|charge.?off/.test(t)){
    return `🗑 Your derogatory playbook, ranked by leverage:\n\n1. 📉 AT&T $1,312 — DISPUTE FIRST (free). Equifax says unpaid, Experian says paid — demand Equifax verify or delete. If verified anyway: written pay-for-delete with Sunrise Credit Service, open at 40% (~$525).\n2. 🔧 Snap-On $4,141 — unpaid CO re-reporting monthly on all 3 bureaus. Written settlement offer (start ~40%) with deletion as an explicit written condition.\n3. 🎓 Navient $10,871 (joint) — biggest dollar, slowest win. Charged-off private loans often settle 40–60%. Get any agreement in writing before paying $1.\n4. 💌 Current + Grow Credit — already PAID: send goodwill-deletion letters. Easiest wins on the board.\n\nGolden rules: nothing by phone, everything certified mail, never re-acknowledge old debt casually (it can reset clocks in some states). FICO 8 counts even paid collections — deletion is always the goal.`;
  }

  /* -- utilization explainer -- */
  if(/utilization|util/.test(t)){
    const r = revolvers().map(a=>`• ${a.emoji} ${a.name}: ${fmt$(a.balance)} / ${fmt$(a.limit)} = ${fmtPct(acctUtil(a))}`).join('\n');
    return `📊 Utilization = STATEMENT balance ÷ limit. It’s 30% of your FICO and has no memory — fix it one month, it scores clean the next.\n\nYour live balances:\n${r}\n\nOverall: ${fmtPct(totalUtil())} 🎉\n\nBUT — the bureaus still see your June statements: $173/$200 (87%) and $497–505/$500 (~100%). That’s what’s scored until the July statements cut. You already did the fix; now protect it — don’t add spending before the statement dates. Targets: under 10% great, 1–9% on one card + $0 on the rest (“AZEO”) is optimal.`;
  }

  /* -- simulate -- */
  if(/what if|simulate|would happen/.test(t)){
    if(amt && /pay/.test(t)){
      const est = simEstimate({pay:amt});
      return `🔮 Paying ${fmt$(amt)} toward your cards:\n\n→ Utilization: ${fmtPct(est.curU)} → ${fmtPct(est.newU)}\n→ Estimated score change: ${est.delta>=0?'+':''}${est.delta} points\n→ Projected average: ${clamp(avgScore()+est.delta,300,850)}\n\n(Estimate, not a guarantee.) Open the 🧮 Simulator to fine-tune the scenario.`;
    }
    return `🧮 Head to the Simulator tab — sliders for paydowns and CLIs, toggles for collection removal, new cards, and inquiries, with live bureau-by-bureau projections. Or ask me directly: “what if I pay $800?”`;
  }

  /* -- goodwill / dispute / AU / general knowledge -- */
  if(/goodwill/.test(t)) return `💌 Goodwill letters — your two best candidates are PAID charge-offs:\n\n• Current (paid $0, CO late 2025) — cite that it’s fully paid and ask for a one-time courtesy deletion\n• Grow Credit (paid — the whole history was $38!) — tiny paid debts are the easiest deletions in the business\n\nAlso worth one for the Cap One late streak (Oct–Dec 2025) once you have 6+ clean months — you hit that in August. Keep it short: take responsibility, show the clean streak, ask a human for a courtesy adjustment. Success ≈ 20–30%, cost $0. Follow up in 30 days.`;
  if(/authorized user|\bau\b/.test(t)) return `👥 Authorized User strategy: your Chase (JPMCB) AU card ran perfect 2019–2024 with a $6,400 limit — it closed Dec 2024 but keeps aging your file for years. If that cardholder (or any family member with an old, clean, low-utilization card) re-adds you to an OPEN card, you inherit its age, limit, and history again — one of the few instant legit boosts. Rules: perfect history only, utilization under 10%, and confirm the bank reports AUs to all three bureaus.`;
  if(/inquir/.test(t)) return `🔍 Your inquiry situation: ~15 hard pulls, nearly all from Dec 2025 auto shopping (Westlake, Ally, Exeter, Gary Yeomans Honda…). Good news: FICO scores an auto-shopping window as ONE inquiry, and inquiries stop being scored after 12 months — the whole cluster stops counting around Dec 2026 and falls off the report entirely Dec 2027. The Jan 2026 Nowcom pull scores until Jan 2027.\n\nRule until 2027: zero new applications. Soft pulls (your own score checks, Cap One CLI requests) never hurt.`;
  if(/cli|limit increase|graduat/.test(t)) return `📈 Capital One strategy (soft pull, free points):\n\n• Platinum Secured …1473 — ask about GRADUATION to unsecured in August (6 clean months since Feb). Deposit back, usually a limit bump.\n• Quicksilver …5098 — request a CLI at the same time. A $200 limit makes every coffee a utilization spike; even $200→$500 is huge percentage-wise.\n\nBest timing: right after a statement reports a low balance. Both asks are soft pulls at Cap One — zero risk.`;
  if(/mortgage/.test(t)) return `🏠 Mortgage lenders pull FICO 2/4/5 and take the MIDDLE score. Yours today: EXP 526 · EQU 511 · TU 619 → mid-score 526. FHA floor is 580; most conventional wants 620+.\n\nThese older models punish unpaid collections harder than FICO 8 — so the AT&T / Snap-On / Navient work moves your mortgage scores fastest. Roadmap: disputes + settlements → 24 clean months → utilization under 10% → 620+ mid-score is realistic by 2028. Your Goals tab tracks it.`;
  if(/auto|car loan|vehicle|tesla/.test(t)) return `🚗 Your hidden strength: FICO Auto 5/4/2 on TransUnion is ALREADY 640 — fair-rate territory, and plenty of auto lenders pull exactly that score. (Auto 8: EQU 541 / TU 597 / EXP 589.)\n\nPlay: 1) win the Equifax disputes so no lender sees the 5-teens, 2) hold utilization under 10%, 3) when you shop again, keep ALL applications inside a 14-day window so they score as one inquiry — unlike Dec 2025, when the file collected ~13 pulls over 3 weeks. A credit-union pre-approval (Alliant already pulled your TU) beats dealer-desk shotgunning.`;
  if(/freeze|identity|theft|fraud|alert/.test(t)) return `🧊 Your initial fraud alert runs until May 20, 2027 — and here’s the removal playbook you saved. Removal must be requested at EACH bureau separately (placement was shared; removal isn’t):\n\n🔵 EQUIFAX — fastest: myEquifax account → manage alerts. By mail: Equifax Information Services LLC, P.O. Box 105069, Atlanta, GA 30348-5069 — written request + copy of government ID + proof of address (utility bill or bank statement).\n\n🟢 EXPERIAN — Fraud Alert Center at experian.com, or 1-888-397-3742, or mail: Experian, P.O. Box 9554, Allen, TX 75013 — include name, SSN, DOB, addresses for 2 years, ID + utility bill.\n\n🟣 TRANSUNION — TransUnion Service Center online, or 1-800-916-8800, or mail: TransUnion Fraud Victim Assistance, P.O. Box 2000, Chester, PA 19016.\n\n⚠️ Heads up: the alert makes lenders verify your identity but does NOT hurt your score. Only remove it if it’s blocking something you need (instant approvals, CLI requests). All three are queued as tasks due Jul 24.`;
  if(/fico (8|9|10)|score model|vantage/.test(t)) return `🧠 Model cheat sheet:\n\n• FICO 8 — what most card issuers use. Paid collections still hurt; small collections (<$100) ignored.\n• FICO 9 — kinder: paid collections ignored, medical debt weighted less.\n• FICO 10/10T — trended data: 24 months of balance *patterns*, so paying-over-time vs. carrying matters.\n• Auto 8/9 — auto-history weighted. Mortgage: FICO 2/4/5.\n• VantageScore (Credit Karma) — NOT what most lenders use; treat it as a directional signal only.\n\nThe good news: utilization + on-time payments move ALL of them.`;
  if(/hello|hi\b|hey/.test(t)) return `👋 Hey ${S.profile.name}! I track everything on this dashboard. Tell me things like:\n\n💰 “I paid Discover $500” — logs it everywhere\n📈 “TransUnion is now 670” — updates cards & graphs\n🔔 “Remind me to call Midland Tuesday”\n🧭 “What should I do next?”\n🔮 “What if I pay $1,000?”\n\nWhat’s happening with your credit today?`;
  if(/thank/.test(t)) return `🙌 Anytime. Current standing: avg ${avgScore()}, utilization ${fmtPct(totalUtil())}, ${S.tasks.filter(x=>!x.done).length} open tasks. You’re ${Math.max(0,S.profile.goalScore-avgScore())} points from your ${S.profile.goalScore} goal — keep stacking wins. 🚀`;

  /* -- fallback -- */
  return `⭐ I track your dashboard and know FICO inside-out. I understood: “${text}”\n\nI can act on:\n💰 Payments — “I paid Capital One $200”\n📈 Score updates — “Experian is 675 now”\n🔔 Reminders — “remind me to call Equifax”\n🧭 Strategy — “what should I do next?”\n🔮 Scenarios — “what if I pay $1,000?”\n📚 Any credit topic — disputes, goodwill, AUs, CLIs, mortgage scores, FICO models…\n\nFor deep analysis of documents & screenshots, share them with Claude in your chat and say “update Centauri Credit”.`;
}

/* ================================================================
   INIT
   ================================================================ */
document.documentElement.dataset.theme = (S.settings && S.settings.theme) || 'dark';
render();
</script>
<script>
/* ================================================================
   AUTO-UPDATER — propagate any new deploy to every device
   Bump APP_BUILD on each deploy; online devices refresh themselves.
   ================================================================ */
window.APP_BUILD = "b10-20260719";
(function(){
  var CHECK_MS = 150000; // ~2.5 min
  function build(){ return window.APP_BUILD || ''; }
  function safeToReload(){
    var ae = document.activeElement, tag = ae && ae.tagName;
    if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT') return false;
    if(document.querySelector('.modal-veil')) return false;
    return true;
  }
  async function applyUpdate(){
    try{ if(window.caches){ var ks = await caches.keys(); await Promise.all(ks.map(function(k){return caches.delete(k);})); } }catch(e){}
    try{ if(navigator.serviceWorker){ var rs = await navigator.serviceWorker.getRegistrations(); await Promise.all(rs.map(function(r){return r.update();})); } }catch(e){}
    location.reload();
  }
  window.ccApplyUpdate = applyUpdate;
  function banner(){
    if(document.getElementById('cc-upd')) return;
    var d = document.createElement('div');
    d.id = 'cc-upd';
    d.style.cssText = 'position:fixed;left:50%;transform:translateX(-50%);bottom:calc(20px + env(safe-area-inset-bottom));z-index:130;background:linear-gradient(135deg,#2a63d6,#7b3ff0);color:#fff;padding:12px 20px;border-radius:14px;box-shadow:0 14px 34px rgba(0,0,0,.45);font:600 13.5px system-ui,-apple-system,sans-serif;display:flex;gap:10px;align-items:center;cursor:pointer;max-width:88vw';
    d.innerHTML = '🔄 New version — updating…';
    d.onclick = applyUpdate;
    document.body.appendChild(d);
    var tries = 0;
    (function waitIdle(){
      if(safeToReload()) return applyUpdate();
      if(tries++ > 40) return;              // ~2 min max wait for idle
      setTimeout(waitIdle, 3000);
    })();
  }
  async function check(){
    if(location.protocol === 'file:') return;
    try{
      var res = await fetch('./index.html?ccv=' + Date.now(), { cache:'no-store' });
      if(!res.ok) return;
      var txt = await res.text();
      var m = txt.match(/APP_BUILD\s*=\s*["']([^"']+)["']/);
      if(m && m[1] && build() && m[1] !== build()) banner();
    }catch(e){}
  }
  setTimeout(check, 5000);
  setInterval(check, CHECK_MS);
  document.addEventListener('visibilitychange', function(){ if(!document.hidden) check(); });
})();
</script>
<script type="module">
/* ================================================================
   ☁️ CENTAURI CLOUD — Firebase Firestore real-time sync
   Collections prefix: cc_  ·  data lives at cc_spaces/{syncCode}
   The sync code is a private random key — treat the sync link
   like a password. No accounts, no login, per Centauri Cloud spec.
   ================================================================ */
(function(){
  const el = document.getElementById('syncstatus');
  window.SYNC_STATE = 'connecting';
})();
function setSyncState(st, msg){
  window.SYNC_STATE = st;
  const el = document.getElementById('syncstatus');
  if(el){
    const map = { connecting:['#898781','connecting…'], synced:['#0ca30c','synced'], error:['#d03b3b','sync error'], offline:['#898781','offline — saved on this device'] };
    const [c,t] = map[st]||map.connecting;
    el.innerHTML = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${c};margin-right:6px;vertical-align:0"></span>☁️ ${msg||t}`;
  }
}
window.setSyncState = setSyncState;

try{
  /* ---- sync code (capability key) ---- */
  const params = new URLSearchParams(location.search);
  let code = params.get('sync');
  if(code){ try{ localStorage.setItem('cc-sync-code', code); }catch(e){} }
  else { try{ code = localStorage.getItem('cc-sync-code'); }catch(e){} }
  if(!code){
    code = Array.from(crypto.getRandomValues(new Uint8Array(15))).map(b=>'abcdefghjkmnpqrstuvwxyz23456789'[b%31]).join('');
    try{ localStorage.setItem('cc-sync-code', code); }catch(e){}
  }
  window.CC_SYNC_CODE = code;

  const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js');
  const { getFirestore, doc, setDoc, onSnapshot, collection, serverTimestamp } =
    await import('https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js');

  const firebaseConfig = {
    apiKey: "AIzaSyBs8jZeW96DsumVVpK1mANVDvg6-LqUILg",
    authDomain: "todo-107e0.firebaseapp.com",
    projectId: "todo-107e0",
    storageBucket: "todo-107e0.firebasestorage.app",
    messagingSenderId: "1001442592988",
    appId: "1:1001442592988:web:1c73371e2a069b4bbd8c19"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const CLIENT = Math.random().toString(36).slice(2);
  const stateRef = doc(db, 'cc_spaces', code);
  const blobsCol = collection(db, 'cc_spaces', code, 'blobs');
  window.BLOBS = window.BLOBS || {};
  const uploadedBlobs = new Set();
  let seeded = false;

  /* ---- push local state → cloud (debounced via persist()) ---- */
  async function pushNow(){
    try{
      const s = JSON.parse(JSON.stringify(S));
      delete s._rev;
      /* externalize large screenshots into blob docs (1MB doc limit) */
      for(let i=0;i<(s.contacts||[]).length;i++){
        const atts = s.contacts[i].attachments||[];
        for(let j=0;j<atts.length;j++){
          const a = atts[j];
          if(a.dataUrl && a.dataUrl.length > 2000){
            if(!a.blobId) a.blobId = 'b'+Math.random().toString(36).slice(2,12);
            const live = (S.contacts[i]&&S.contacts[i].attachments[j]);
            if(live) live.blobId = a.blobId;
            window.BLOBS[a.blobId] = a.dataUrl;
            if(!uploadedBlobs.has(a.blobId)){
              await setDoc(doc(blobsCol, a.blobId), { data: a.dataUrl, name: a.name||'', createdAt: serverTimestamp() });
              uploadedBlobs.add(a.blobId);
            }
            delete a.dataUrl;
          }
        }
      }
      S._rev = (S._rev||0)+1;
      await setDoc(stateRef, { state: JSON.stringify(s), rev: S._rev, writer: CLIENT, updatedAt: serverTimestamp() });
      setSyncState('synced');
    }catch(e){
      setSyncState('error');
      if(typeof toast==='function') toast('⚠️ Cloud sync failed', e.message||'Will retry on next change', 'warn');
    }
  }
  let pushTimer = null;
  window.CloudPush = function(){ clearTimeout(pushTimer); pushTimer = setTimeout(pushNow, 900); };

  /* ---- cloud → local (the snapshots ARE the state) ---- */
  onSnapshot(stateRef, snap => {
    if(!snap.exists()){
      if(!seeded){ seeded = true; pushNow(); }  /* first-run seeding */
      return;
    }
    setSyncState('synced');
    const d = snap.data();
    if(d.writer === CLIENT) return;                 /* our own write echoed back */
    if((d.rev||0) <= (S._rev||0)) return;           /* stale */
    try{
      const incoming = JSON.parse(d.state);
      incoming._rev = d.rev;
      S = incoming;
      Store.save(S);
      if(document.querySelector('.modal-veil')) window._pendingRender = true;
      else render();
      const stamp = document.getElementById('savestamp');
      if(stamp) stamp.textContent = '☁️ Updated from cloud ' + fmtTime(new Date());
    }catch(e){ console.warn('sync apply failed', e); }
  }, err => {
    setSyncState('error');
    if(typeof toast==='function') toast('⚠️ Sync error', err.message, 'warn');
  });

  onSnapshot(blobsCol, qs => {
    let changed = false;
    qs.forEach(d => { if(!window.BLOBS[d.id]){ window.BLOBS[d.id] = d.data().data; changed = true; uploadedBlobs.add(d.id); } });
    if(changed && CC.view==='contacts' && !document.querySelector('.modal-veil')) render();
  }, ()=>{});

  setSyncState('connecting');

  /* ---- PWA service worker (only when hosted) ---- */
  if('serviceWorker' in navigator && location.protocol === 'https:'){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
}catch(e){
  /* offline / file:// / blocked network — app runs fully local */
  setSyncState('offline');
  window.CC_SYNC_CODE = window.CC_SYNC_CODE || (function(){ try{ return localStorage.getItem('cc-sync-code'); }catch(_){ return null; } })();
}
</script>
